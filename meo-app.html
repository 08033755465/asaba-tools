<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEO運用ツール（あさばグループ）</title>
<style>
  :root{
    --bg:#f5f6f8; --card:#ffffff; --ink:#1f2430; --sub:#6b7280;
    --line:#e5e7eb; --accent:#2f6df0; --accent-d:#1f4fc4;
    --ok:#138a52; --okbg:#e7f6ee; --warn:#b9821b; --warnbg:#fdf4e3;
    --err:#c23b3b; --errbg:#fbeaea; --chip:#eef1f5;
  }
  body.dark{
    --bg:#161a22; --card:#1f2530; --ink:#e8eaf0; --sub:#9aa3b2;
    --line:#333c4a; --accent:#5b8cf5; --accent-d:#7aa4ff;
    --ok:#3fbe83; --okbg:#1c3a2c; --warn:#e0a849; --warnbg:#3a2f1a;
    --err:#e06a6a; --errbg:#3a2222; --chip:#2a313d;
  }
  body.dark .cal .cell{background:#222a36}
  body.dark .cal .cell.muted{background:#1b212b}
  body.dark .hbtrack{background:#2a313d}
  body.dark .kpi{background:#222a36}
  body.dark .kpi.main{background:linear-gradient(135deg,#243150,#2c2340);border-color:#3a4a6e}
  body.dark .sumbox{background:#222a36}
  body.dark .thumb{background:#222a36}
  body.dark .thumb .ph{background:#1b212b}
  body.dark table th{background:#222a36}
  body.dark .login-card{background:rgba(31,37,48,.94)}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{overflow-x:hidden}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.6;font-size:15px;overflow-x:hidden;max-width:100vw}

  /* ===== 地図風背景（共通） ===== */
  .mapbg{position:absolute;inset:0;overflow:hidden;
    background:
      linear-gradient(135deg,#dfeaf6 0%,#e9f1ea 55%,#eef0f6 100%);}
  .mapbg::before{content:"";position:absolute;inset:-20%;
    background-image:
      linear-gradient(rgba(120,150,190,.16) 1px,transparent 1px),
      linear-gradient(90deg,rgba(120,150,190,.16) 1px,transparent 1px);
    background-size:38px 38px;}
  .mapbg::after{content:"";position:absolute;inset:0;
    background:
      radial-gradient(closest-side,rgba(120,190,140,.30),transparent) 18% 26%/180px 130px no-repeat,
      radial-gradient(closest-side,rgba(120,190,140,.25),transparent) 78% 64%/220px 150px no-repeat,
      linear-gradient(72deg,transparent 46%,rgba(150,180,220,.45) 47%,rgba(150,180,220,.45) 50%,transparent 51%),
      linear-gradient(-20deg,transparent 62%,rgba(150,180,220,.40) 63%,rgba(150,180,220,.40) 65%,transparent 66%);
    background-repeat:no-repeat;}

  /* ===== ログイン ===== */
  .login-wrap{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden}
  .login-pin{position:absolute;font-size:22px;filter:drop-shadow(0 2px 3px rgba(0,0,0,.25));animation:bob 3s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .login-card{position:relative;z-index:2;background:rgba(255,255,255,.92);backdrop-filter:blur(3px);
    border:1px solid var(--line);border-radius:18px;padding:28px 22px;width:100%;max-width:380px;text-align:center;
    box-shadow:0 12px 40px rgba(40,60,100,.18)}
  .login-card h1{font-size:20px;margin:6px 0 4px}
  .login-card p.sub{color:var(--sub);font-size:13px;margin:0 0 20px}
  .field{text-align:left;margin-bottom:14px}
  .field label{display:block;font-size:13px;font-weight:700;margin-bottom:5px}
  .field input{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-size:15px}
  .demo-note{background:var(--warnbg);color:var(--warn);font-size:12px;border-radius:10px;padding:9px 11px;margin-bottom:16px}

  /* ===== アプリ枠 ===== */
  .app{display:none}
  header{position:sticky;top:0;z-index:30;background:var(--card);border-bottom:1px solid var(--line);
    padding:11px 16px;display:flex;align-items:center;justify-content:space-between}
  header .ttl{font-size:15px;font-weight:700;display:flex;align-items:center;gap:7px}
  .acct{font-size:12px;color:var(--sub);display:flex;align-items:center;gap:8px}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--ok);display:inline-block}
  main{max-width:880px;margin:0 auto;padding:16px 14px 90px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
  .card h2{font-size:15px;margin:0 0 10px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  p.sub{color:var(--sub);font-size:13px;margin:6px 0}
  .btn{display:inline-block;background:var(--accent);color:#fff;border:none;border-radius:10px;
    padding:11px 16px;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none}
  .btn:active{background:var(--accent-d)}
  .btn.ghost{background:#fff;color:var(--accent);border:1px solid var(--accent)}
  .btn.sm{padding:7px 12px;font-size:13px}
  .btn.mini{padding:5px 10px;font-size:13px;border-radius:8px}
  .btn[disabled]{background:#aab2c0;cursor:not-allowed}
  .btn.ghost[disabled]{background:#fff;color:#aab2c0;border-color:#cfd5de}
  body.dark .btn.ghost{background:var(--card)}
  body.dark .btn.ghost[disabled]{background:var(--card);color:#5b6473;border-color:#3a424f}
  .thumb .ph{cursor:pointer}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .row.between{justify-content:space-between;align-items:center}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:12px;font-weight:700;background:var(--chip)}
  .pill.ok{background:var(--okbg);color:var(--ok)} .pill.warn{background:var(--warnbg);color:var(--warn)}
  .pill.up{background:var(--okbg);color:var(--ok)} .pill.down{background:var(--errbg);color:var(--err)}
  .pill.flat{background:var(--chip);color:var(--sub)}
  select,input.inp{border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:14px;background:#fff}
  label.fl{font-size:12px;color:var(--sub);font-weight:700;display:block;margin-bottom:3px}

  /* ===== ダッシュ：地図モック ===== */
  .map-mock{position:relative;height:230px;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .map-mock .mapbg{position:absolute;inset:0}
  .map-pin{position:absolute;transform:translate(-50%,-100%);cursor:pointer;text-align:center;z-index:2}
  .map-pin .dotpin{width:18px;height:18px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
    border:2px solid #fff;box-shadow:0 2px 4px rgba(0,0,0,.3);margin:0 auto}
  .map-pin .lab{margin-top:3px;font-size:10px;font-weight:700;background:rgba(255,255,255,.9);
    border-radius:5px;padding:1px 4px;white-space:nowrap;display:none}
  .map-pin.sel{z-index:5}
  .map-pin.sel .dotpin{width:24px;height:24px;outline:3px solid rgba(47,109,240,.35);outline-offset:1px}
  .map-pin.sel .lab{display:inline-block}
  .map-cap{position:absolute;left:8px;bottom:8px;right:8px;z-index:3;font-size:10px;color:#445;
    background:rgba(255,255,255,.82);border-radius:8px;padding:5px 8px}
  .legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;font-size:12px;color:var(--sub)}
  .legend span{display:inline-flex;align-items:center;gap:4px}
  .legend i{width:11px;height:11px;border-radius:50%;display:inline-block}

  /* 期間バー */
  .period{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
  .period .grp{display:flex;flex-direction:column}
  /* KPI */
  .kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .kpi{background:#fafbfc;border:1px solid var(--line);border-radius:12px;padding:12px}
  .kpi.main{background:linear-gradient(135deg,#eef4ff,#f7f0fe);border-color:#cdd9f5}
  .kpi .label{font-size:12px;color:var(--sub)}
  .kpi .num{font-size:22px;font-weight:800;margin-top:2px}
  .kpi .deltas{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px}
  .kpi .deltas .t{font-size:10px;color:var(--sub);align-self:center}
  .memo{margin-top:12px;background:var(--okbg);border:1px solid var(--line);border-left:3px solid var(--ok);border-radius:9px;padding:10px 12px}
  .memo-hd{font-size:12px;font-weight:700;color:var(--ok);margin-bottom:3px}
  .memo-body{margin:0;font-size:13px}
  .memo-body.empty{color:var(--sub)}
  /* table */
  .tablewrap{overflow:auto;border:1px solid var(--line);border-radius:10px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{border-bottom:1px solid var(--line);padding:8px 10px;text-align:left;white-space:nowrap}
  th{background:#f3f5f8;position:sticky;top:0;font-size:12px}
  tr:last-child td{border-bottom:none}
  /* メイングラフ（SVG） */
  .chartwrap{width:100%;overflow:hidden}
  .chartwrap svg{width:100%;height:auto;display:block}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg button{border:none;background:#fff;padding:6px 11px;font-size:13px;cursor:pointer;color:var(--sub)}
  .seg button.on{background:var(--accent);color:#fff;font-weight:700}
  /* 投稿づくりステップ */
  .flow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
  .flow .st{flex:1;min-width:110px;border:1px solid var(--line);border-radius:10px;padding:9px;background:#fafbfc;font-size:12px}
  .flow .st b{display:block;font-size:13px}
  .flow .st .badge{font-size:11px;color:var(--sub)}
  textarea{width:100%;min-height:90px;border:1px solid var(--line);border-radius:10px;padding:10px;font-size:14px;font-family:inherit;resize:vertical}
  .cnt{font-size:12px;color:var(--sub);text-align:right}
  .cnt.bad{color:var(--err)} .cnt.good{color:var(--ok)}
  /* ギャラリー */
  .gal{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .thumb{border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff}
  .thumb .ph{aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;font-size:30px;
    background:linear-gradient(135deg,#eef3ff,#f7eefc)}
  .thumb .meta{padding:7px 8px;font-size:11px}
  .thumb .meta .id{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .thumb label.ck{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--sub);padding:0 8px 7px}
  /* 設定 */
  .setrow{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
  .setrow:last-child{border-bottom:none}
  .setrow .k{font-size:14px;font-weight:700}.setrow .d{font-size:12px;color:var(--sub)}
  .setrow.click{cursor:pointer;border-radius:10px;margin:0 -8px;padding-left:8px;padding-right:8px;transition:background .12s}
  .setrow.click:hover{background:rgba(120,120,120,.08)}
  .setrow .val{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--accent)}
  .setrow .val .chev{color:var(--sub);font-size:18px;font-weight:400}
  .picklist{display:flex;flex-direction:column;gap:8px;margin-top:8px}
  .pickopt{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;
    border:1px solid var(--line);background:#fff;border-radius:11px;padding:13px 15px;font-size:15px;cursor:pointer;text-align:left}
  .pickopt.sel{border-color:var(--accent);color:var(--accent);font-weight:800;box-shadow:inset 0 0 0 1px var(--accent)}
  .pickopt .ck{color:var(--accent);font-weight:900}
  body.dark .pickopt{background:#2a2f37;color:#e8eaed}
  /* リンク集：青文字リンク＋コピー */
  .lktabs{display:flex;gap:8px;margin-bottom:4px}
  .lktabs button{flex:1;border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px;font-size:14px;font-weight:700;cursor:pointer;color:var(--sub)}
  .lktabs button.on{border-color:var(--accent);color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}
  body.dark .lktabs button{background:#222a36}
  .lkitem{display:inline-flex;align-items:center;gap:3px;margin:4px 10px 4px 0}
  .lk{color:var(--accent);font-weight:800;text-decoration:underline;text-underline-offset:2px;cursor:pointer;
    user-select:none;-webkit-user-select:none;font-size:14px}
  .lk.warn{color:var(--warn);text-decoration:underline dotted}
  .lkcopy{border:0;background:transparent;cursor:pointer;font-size:13px;padding:2px 3px;opacity:.55;line-height:1}
  .lkcopy:hover{opacity:1}
  .lkcopy:disabled{opacity:.25;cursor:default}
  /* ダッシュ：取込ドロワー（上から引き出し）＋店舗バー固定 */
  .drawer{padding:0!important;overflow:hidden}
  .dhandle{display:flex;align-items:center;justify-content:center;gap:9px;cursor:pointer;padding:11px 14px;font-weight:800;font-size:14px;user-select:none}
  .dhandle .grab{width:38px;height:4px;border-radius:3px;background:var(--line)}
  .dhandle .dchev{margin-left:auto;color:var(--sub);transition:transform .25s}
  .drawer.open .dhandle .dchev{transform:rotate(180deg)}
  .dhandle{touch-action:pan-x}
  .swipehint{display:none;font-size:10px;font-weight:600;color:var(--sub);margin-left:6px}
  @media(max-width:560px){ .swipehint{display:inline} }
  .dbody{max-height:0;opacity:0;overflow:hidden;transition:max-height .3s ease,opacity .2s;padding:0 16px}
  .drawer.open .dbody{max-height:1600px;opacity:1;padding:0 16px 16px}
  .stickybar{position:sticky;top:48px;z-index:15}
  .covwrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .covm{font-size:12px;font-weight:700;border:1px solid var(--line);border-radius:8px;padding:4px 8px}
  .covm b{font-weight:800}
  .covm.full{border-color:var(--ok);color:var(--ok)}
  .covm.part{border-color:var(--warn);color:var(--warn)}
  .swatch{display:inline-block;width:20px;height:20px;border-radius:6px;border:1px solid var(--line);vertical-align:middle}

  /* ===== タブバー ===== */
  .tabbar{position:fixed;bottom:0;left:0;right:0;z-index:60;background:var(--card);border-top:1px solid var(--line);
    display:flex;max-width:880px;margin:0 auto}
  .tabbar button{flex:1;border:none;background:none;padding:9px 4px 11px;font-size:11px;color:var(--sub);cursor:pointer}
  .tabbar button .ic{display:block;font-size:19px;line-height:1.2}
  .tabbar button.on{color:var(--accent);font-weight:700}

  /* ===== スライドアップ・ナビパネル ===== */
  .navPanel{position:fixed;left:0;right:0;top:0;bottom:0;z-index:50;background:var(--bg);
    transform:translateY(100%);transition:transform .28s cubic-bezier(.3,.7,.3,1);
    display:flex;flex-direction:column;max-width:880px;margin:0 auto;box-shadow:0 -8px 30px rgba(0,0,0,.15)}
  .navPanel.open{transform:translateY(0)}
  .grab{background:var(--card);border-bottom:1px solid var(--line);padding:6px 12px 8px;touch-action:none}
  .grab-bar{width:42px;height:5px;border-radius:99px;background:#cfd5de;margin:2px auto 8px}
  .grab-tabs{display:flex;gap:6px;justify-content:center}
  .grab-tabs button{flex:1;max-width:160px;border:1px solid var(--line);background:#fff;border-radius:9px;
    padding:8px 6px;font-size:13px;color:var(--sub);cursor:pointer;font-weight:700}
  .grab-tabs button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .grab-close{display:block;width:100%;text-align:center;background:none;border:none;color:var(--sub);
    font-size:12px;padding:7px 0 2px;cursor:pointer}
  .track-vp{flex:1;overflow:hidden}
  .track{display:flex;width:300%;height:100%;transition:transform .25s ease}
  .track .subpage{width:33.3333%}
  .subpage{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;padding:14px 14px 24px}
  .settingsPanel .subpage{width:100%}

  .page-pad{padding-bottom:4px}
  .center{text-align:center}.mt{margin-top:12px}.mb{margin-bottom:10px}
  /* 店舗ナビ（プルダウン＋上下/左右ボタン） */
  .navbtns{display:inline-flex;gap:5px}
  .stepper{display:flex;flex-direction:column;gap:3px}
  .stepper button{border:1px solid var(--line);background:#fff;border-radius:7px;width:30px;height:21px;
    font-size:11px;line-height:1;cursor:pointer;color:var(--accent)}
  .selstep{display:inline-flex;align-items:center;gap:4px}
  .selstep button{border:1px solid var(--line);background:#fff;border-radius:8px;width:28px;height:30px;
    font-size:12px;line-height:1;cursor:pointer;color:var(--accent);flex:0 0 auto}
  .selstep button:active{background:var(--accent);color:#fff}
  .segval{display:inline-block;min-width:64px;text-align:center;font-size:12px;font-weight:800;color:var(--accent);padding:0 4px}
  .lgndwrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .lgnd{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);background:#fff;
    border-radius:999px;padding:4px 10px;font-size:12px;font-weight:700;color:var(--fg);cursor:pointer;line-height:1}
  .lgnd .dotc{width:10px;height:10px;border-radius:50%;flex:0 0 auto}
  .lgnd.off{opacity:.4;text-decoration:line-through}
  body.dark .segval{color:var(--accent)}
  body.dark .lgnd{background:#2a2f37;color:#e8eaed;border-color:#3a4048}
  .calwrap{display:flex;align-items:center;gap:6px}
  .calwrap input[type=month]{border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:14px;background:#fff}
  /* ランキング：グループ別 */
  .rankgrp{margin-top:10px}
  .grphd{display:flex;align-items:center;gap:6px;font-weight:800;font-size:13px;margin:0 0 4px}
  .grphd i{width:10px;height:10px;border-radius:3px;display:inline-block}
  /* ランキング：見出しに▲▼コントロール */
  th.hdctrl{white-space:nowrap}
  .hdctrl .hdlbl{font-size:12px}
  .hdstep{display:inline-flex;gap:3px;margin-top:3px;justify-content:center}
  .hdstep button{border:1px solid var(--line);background:#fff;border-radius:6px;width:24px;height:18px;
    font-size:10px;line-height:1;cursor:pointer;color:var(--accent);padding:0}
  /* 推移セル（スパークライン＋ピル） */
  .trendcell{display:flex;align-items:center;gap:5px;color:var(--sub)}
  .trendcell.up{color:var(--ok)} .trendcell.down{color:var(--err)} .trendcell.flat{color:var(--sub)}
  .trendcell svg{flex:none}
  /* コンパクトな店舗・期間えらび */
  .compactsel{padding:10px 12px}
  .selrow{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:10px}
  .selgrp{display:flex;align-items:center;gap:6px}
  .compactsel select,.compactsel input[type=month]{border:1px solid var(--line);border-radius:9px;padding:7px 9px;font-size:14px;background:#fff}
  .compactsel .stepper button{height:17px}
  /* 天気別／曜日別の横棒 */
  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:560px){.twocol{grid-template-columns:1fr}}
  /* ===== スマホUI整え（PCと切り分け／横幅はみ出し・急な拡大を防止） ===== */
  @media(max-width:560px){
    main{padding:12px 12px 92px}
    .card{padding:13px}
    /* 店舗・期間などの選択行は内側グループも折り返す */
    .selrow,.selgrp{flex-wrap:wrap}
    .selgrp{gap:6px 8px}
    /* インラインのmin-widthを無効化して画面幅に収める */
    .selrow select,.selgrp select{min-width:0!important;flex:1 1 120px;max-width:100%}
    .selrow input[type=month],.selgrp input[type=month]{flex:1 1 120px;min-width:0}
    .selstep{flex:1 1 auto}
    .selstep select{flex:1 1 auto}
    /* 設定の入力は幅いっぱいに統一 */
    .setrow .inp{max-width:none!important;width:100%}
    .setrow{flex-wrap:wrap}
    /* 見出し・小ボタンの折り返し */
    .row.between{flex-wrap:wrap;gap:8px}
    h2{font-size:16px}
    /* 表は内部スクロール（レイアウトを広げない） */
    .tablewrap{max-width:100%}
  }
  .halfcard{border:1px solid var(--line);border-radius:11px;padding:10px}
  .subhd{font-weight:800;font-size:13px;margin-bottom:6px}
  .hbar{display:flex;align-items:center;gap:7px;margin:5px 0}
  .hblab{width:30px;font-size:12px;font-weight:700;flex:none}
  .hbtrack{flex:1;height:14px;background:#eef1f5;border-radius:7px;overflow:hidden}
  .hbfill{height:100%;border-radius:7px;min-width:2px;transition:width .2s}

  /* modal */

  /* トースト */
  .toast{position:fixed;left:50%;bottom:78px;transform:translateX(-50%) translateY(12px);
    z-index:120;background:#1f2430;color:#fff;padding:10px 16px;border-radius:22px;font-size:13px;
    box-shadow:0 6px 20px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;max-width:88%;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  /* トップへ戻る */
  .toTop{position:fixed;right:14px;bottom:74px;z-index:110;width:42px;height:42px;border-radius:50%;
    border:1px solid var(--line);background:var(--card);color:var(--accent);font-size:19px;line-height:1;

  .kzFab{position:fixed;right:14px;bottom:122px;z-index:110;width:46px;height:46px;border-radius:50%;

  /* 印刷（レポートまとめのPDF保存用） */
  @media print{
    .tabbar,.navPanel,.toTop,.toast,header,.noprint{display:none!important}

<script>
/* =========================================================
   MEO運用ツール（あさばグループ様）v1.0 本番運用版
   ・月次レポートCSVの取込で数値を表示（②月次レポートDB列に対応）
   ・投稿/画像は端末（localStorage）に保存し、CSVでNotion⑦⑧⑨と連携
   ・GMO一括投稿は48列CSV→GMO書き出しツール（meo-export.html）で.xlsx化
   ・ログイン認証（招待制）は次フェーズで接続
   ========================================================= */

/* ===== 店舗マスタ（mx/myは店舗マップの表示座標） ===== */
const DATA = {
  account:"あさばグループ",
  stores:[
    {code:"ASK-EDO", name:"あさば整骨院 江戸川台",   group:"整骨院", mx:22, my:30},
    {code:"ASK-SMT", name:"あさば整骨院 新松戸",     group:"整骨院", mx:34, my:52},
    {code:"ASK-NGR", name:"あさば整骨院 南流山",     group:"整骨院", mx:42, my:44, gmoId:"117413"},
    {code:"ASK-KSW", name:"あさば整骨院 柏の葉",     group:"整骨院", mx:50, my:26},
    {code:"ASK-YSO", name:"あさば整骨院 八潮",       group:"整骨院", mx:24, my:70},
    {code:"AST-MSC", name:"あさば整体院 三郷中央",   group:"整体院", mx:30, my:62},
    {code:"AST-MNW", name:"あさば整体院 三ノ輪",     group:"整体院", mx:18, my:82},
    {code:"AST-MRY", name:"あさば整体院 守谷",       group:"整体院", mx:64, my:16},
    {code:"AST-ABK", name:"あさば整体院 我孫子",     group:"整体院", mx:62, my:38},
    {code:"PCE-KSW", name:"マシンピラティスPeace 柏の葉", group:"Peace", mx:54, my:30},
    {code:"PCE-NGR", name:"マシンピラティスPeace 南流山", group:"Peace", mx:46, my:48},
    {code:"PCE-YSO", name:"マシンピラティスPeace 八潮",   group:"Peace", mx:28, my:74},
    {code:"PCE-MSC", name:"マシンピラティスPeace 三郷中央",group:"Peace", mx:34, my:66},
    {code:"PCE-ABK", name:"マシンピラティスPeace 我孫子", group:"Peace", mx:66, my:42},
    {code:"PCE-MRY", name:"マシンピラティスPeace 守谷",   group:"Peace", mx:70, my:20},
    {code:"PCE-SMT", name:"マシンピラティスPeace 新松戸", group:"Peace", mx:38, my:56},

  monthly:{}, // ②月次レポートから取込（"店舗コード" -> { "YYYY-MM": {...} }）
  schedule:[], // ⑦定期投稿スケジュール＋⑧投稿文（端末保存／CSVでNotionと連携）
  gallery:[],  // ⑨サムネ画像管理（端末保存／CSVでNotionと連携）
};

/* ===== 指標の定義 ===== */
const METRICS={
  rank:{label:"KW平均順位", unit:"位", better:"low", icon:"📍"},
  views:{label:"表示回数", unit:"回", better:"high", icon:"👀"},
  web:{label:"ウェブクリック", unit:"回", better:"high", icon:"🌐"},
  tel:{label:"電話タップ", unit:"回", better:"high", icon:"📞"},
  route:{label:"ルート検索", unit:"回", better:"high", icon:"🚗"},
  reviews:{label:"口コミ件数", unit:"件", better:"high", icon:"💬"},
  rating:{label:"平均評価", unit:"", better:"high", icon:"⭐", decimal:true},
};
/* 目標CTAに選べる指標（順位は除く） */
const CTA_KEYS=["tel","web","route","views"];
/* 指標カードに並べる順（目標CTAを先頭に動的並べ替え） */
const KPI_KEYS=["views","web","tel","route","reviews","rating","rank"];
/* グラフで切替できる指標 */
const CHART_KEYS=["views","web","tel","route","reviews","rating"];
/* ランキングで切替できる指標 */
const RANK_KEYS=["rank","views","web","tel","route","reviews","rating"];
/* 店舗グループ（整骨院／整体院／Peace） */
const RANK_GROUPS=["整骨院","整体院","Peace"];
/* レポート・投稿では整骨院と整体院を区別しない（区別は色とNotionグループ表示のみ）。
   実質コンテンツ区分は 整骨整体 / ピラティスPeace の2つ。 */
const CONTENT_GROUPS=["整骨整体","Peace"];
function contentGroup(s){ return (s&&s.group==='Peace')?'Peace':'整骨整体'; }
const CONTENT_COLORS={ "整骨整体":"#2f6df0", "Peace":"#a24bd0" };

/* ===== グローバル設定（本番では管理者が変更／Notionに保存） ===== */
const SETTINGS={
  period:{year:2026, month:6},   // 表示中の対象月
  targetCTA:"tel",               // 指標カードの主役＝目標CTA
  chartMetric:"views",           // メイングラフに表示する指標
  chartType:"bar",               // bar | line | area
  rankMetric:"rank",             // ランキングの並べ替え指標
  rankScope:"group",             // ランキングの範囲（group=グループ別 / all=全体 / tier=グループ階層）
  rankTrend:"mom",               // ランキングの推移列（前月比/3ヶ月/6ヶ月/12ヶ月）
  postFilter:"all",              // 投稿予定一覧の状態しぼり込み（all/投稿済/作成中/未投稿）
  postGroup:"all",               // 投稿予定一覧のグループしぼり込み（all/整骨院/整体院/Peace）
  galFilter:"all",               // 画像ギャラリーの状態しぼり込み（all/未生成/生成済/確定）
  groupKW:{ "整骨院":"整体", "整体院":"整体", "Peace":"マシンピラティス" },
  trendScope:"all",              // 年間推移グラフの範囲（all/整骨整体/Peace）
  trendMetric:"views",           // 年間推移グラフの指標
  trendHidden:{},                // 非表示にした店舗（code→true）
  integMode:"month",             // 統合レポートの表示（month=月別×全指標 / metric=項目別×12か月）
  integMetric:"views",           // 統合レポート「項目別」で表示する指標
};
const THEME_COLORS={ "整骨院":"#2f6df0", "整体院":"#138a52", "Peace":"#a24bd0" };
/* 店舗ごとのカラー上書き（端末保存）。未設定ならグループ色にフォールバック */
let STORE_COLORS={};

function keyOf(y,m){return y+"-"+String(m).padStart(2,"0");}
function prevKey(k){let[y,m]=k.split("-").map(Number);m--;if(m<1){m=12;y--;}return keyOf(y,m);}
function yoyKey(k){let[y,m]=k.split("-").map(Number);return keyOf(y-1,m);}
function trailing12(y,m){const out=[];let yy=y,mm=m;for(let i=0;i<12;i++){out.unshift(keyOf(yy,mm));mm--;if(mm<1){mm=12;yy--;}}return out;}

/* ===== CSV共通：パース／生成／ダウンロード ===== */
function parseCSV(text){
  const rows=[]; let i=0, field='', row=[], inQ=false;
  text=String(text).replace(/^\uFEFF/,'').replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  while(i<text.length){
    const c=text[i];
    if(inQ){
      if(c==='"'){ if(text[i+1]==='"'){field+='"';i+=2;continue;} inQ=false;i++;continue; }
      field+=c;i++;continue;
    }
    if(c==='"'){ inQ=true;i++;continue; }
    if(c===','){ row.push(field);field='';i++;continue; }
    if(c==='\n'){ row.push(field);rows.push(row);row=[];field='';i++;continue; }
    field+=c;i++;
  }
  if(field.length||row.length){ row.push(field);rows.push(row); }
  return rows.filter(r=>r.some(x=>String(x).trim()!==''));
}
function toCSV(rows){
  return rows.map(r=>r.map(v=>{
    const s=v==null?'':String(v);
    return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
  }).join(',')).join('\r\n');
}
function downloadText(filename, text, mime){
  const blob=new Blob(["\uFEFF"+text],{type:(mime||'text/csv')+';charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
}
/* 隠しファイル入力でCSVを選ばせる汎用ヘルパー */
function pickCSV(onText){
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='.csv,text/csv';
  inp.onchange=()=>{ const f=inp.files&&inp.files[0]; if(!f)return;
    const rd=new FileReader(); rd.onload=()=>onText(String(rd.result)); rd.readAsText(f,'utf-8'); };
  inp.click();
}
/* 店舗名/コード→店舗コード */
function resolveStoreCode(v){
  if(!v) return null;
  const t=String(v).trim(); if(!t) return null;
  let s=DATA.stores.find(x=>x.code===t); if(s) return s.code;
  s=DATA.stores.find(x=>x.name===t); if(s) return s.code;
  const z=x=>String(x).replace(/[ 　]/g,'');
  s=DATA.stores.find(x=>z(x.name).includes(z(t)) || z(t).includes(z(x.name)));
  return s?s.code:null;
}
/* 対象月→YYYY-MM */
function normMonth(v){
  if(!v) return null;
  const m=String(v).trim().match(/(\d{4})\D+(\d{1,2})/);
  return m ? m[1]+"-"+String(Number(m[2])).padStart(2,"0") : null;
}
/* ===== 月次レポートCSVの取込 ===== */
function importReportsCSV(){ pickCSV(processReportCSVText); }
function processReportCSVText(text){
    try{
      const rows=parseCSV(text);
      if(rows.length<2){ toast('データ行が見つかりませんでした。'); return; }
      const head=rows[0].map(h=>String(h).trim());
      const at=name=>head.findIndex(h=>h===name);
      const ci={
        store: at('店舗')>=0?at('店舗'):at('店舗名'),
        month: at('対象月'), views: at('表示回数'), web: at('ウェブクリック'),
        tel: at('電話タップ'), route: at('ルート検索'), rank: at('平均KW順位'),
        reviews: at('口コミ件数'), rating: at('平均評価'), comment: at('所感・コメント')
      };
      const num=v=>{ if(v==null||String(v).trim()==='')return null; const n=parseFloat(String(v).replace(/[^0-9.\-]/g,'')); return isNaN(n)?null:n; };
      const cell=(row,i)=> i>=0 ? row[i] : undefined;
      let ok=0, ng=0;
      for(let r=1;r<rows.length;r++){
        const row=rows[r];
        const code=resolveStoreCode(cell(row,ci.store));
        const key=normMonth(cell(row,ci.month));
        if(!code||!key){ ng++; continue; }
        if(!DATA.monthly[code]) DATA.monthly[code]={};
        DATA.monthly[code][key]={
          views:num(cell(row,ci.views)), web:num(cell(row,ci.web)), tel:num(cell(row,ci.tel)),
          route:num(cell(row,ci.route)), rank:num(cell(row,ci.rank)), reviews:num(cell(row,ci.reviews)),
          rating:(()=>{ const n=num(cell(row,ci.rating)); return n==null?null:n.toFixed(1); })(),
          comment:(ci.comment>=0?String(cell(row,ci.comment)||'').trim():'')
        };
        ok++;
      }
      saveReports(); renderAll();
      toast(`✅ ${ok}件のレポートを取り込みました${ng?`（${ng}件はスキップ）`:''}。`);
    }catch(e){ toast('CSVの読み込みに失敗しました。形式をご確認ください。'); }
}
/* ===== 月次レポートExcel（GMOインサイト書き出し .xlsx）の取込 =====
   GMOのインサイト書き出しは「インサイト情報サマリ」「クチコミ推移（単月)」など
   店舗が横並び／縦並びのクロス集計。列位置に依存せず、店舗名・対象月を走査して抜き出す。 */
let _XLSXPromise=null;
function loadXLSX(){
  if(window.XLSX) return Promise.resolve(window.XLSX);
  if(_XLSXPromise) return _XLSXPromise;
  _XLSXPromise=new Promise((res,rej)=>{
    const urls=['https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js',
                'https://cdn.jsdelivr.net/npm/xlsx@0.20.3/dist/xlsx.full.min.js'];
    let idx=0;
    const tryNext=()=>{
      if(idx>=urls.length){ rej(new Error('Excel読み込み用の部品を取得できませんでした（ネット接続をご確認ください）')); return; }
      const sc=document.createElement('script'); sc.src=urls[idx++];
      sc.onload=()=>window.XLSX?res(window.XLSX):tryNext();
      sc.onerror=tryNext; document.head.appendChild(sc);
    };
    tryNext();
  });
  return _XLSXPromise;
}
/* 店舗名（Excel表記ゆれ対応）→店舗コード。空白/全角空白/アンダーバー/「店」を無視して突合 */
function matchStoreCode(v){
  const norm=s=>String(s==null?'':s).replace(/[ \u3000_店]/g,'').trim();
  const k=norm(v); if(!k) return null;
  for(const s of DATA.stores){ if(norm(s.name)===k) return s.code; }
  for(const s of DATA.stores){ const n=norm(s.name); if(n && (k.includes(n)||n.includes(k))) return s.code; }
  return null;
}
function xlNum(v){ if(v==null) return null; const s=String(v).replace(/[^0-9.\-]/g,''); if(s===''||s==='-'||s==='.') return null; const n=parseFloat(s); return isNaN(n)?null:n; }
function xlRowStore(row){ for(const x of row){ const c=matchStoreCode(x); if(c) return c; } return null; }
/* 行の中から対象月(YYYY-MM)の列番号を探す（見出し "2026/06" 等） */
function xlMonthCol(row, month){
  const y=month.slice(0,4), mo=parseInt(month.slice(5,7),10);
  for(let ci=0;ci<row.length;ci++){
    const m=String(row[ci]==null?'':row[ci]).trim().match(/^(\d{4})\/(\d{1,2})(?!\d)/);
    if(m && m[1]===y && parseInt(m[2],10)===mo) return ci;
  }
  return null;
}
function importReportsExcel(){
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='.xlsx,.xls,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet';
  inp.onchange=()=>{ const f=inp.files&&inp.files[0]; if(f) processReportExcelFile(f); };
  inp.click();
}
async function processReportExcelFile(f){
    if(!f) return;
    try{
      const XLSX=await loadXLSX();
      const buf=await f.arrayBuffer();
      const wb=XLSX.read(buf,{type:'array'});
      const sheetByKw=(...kws)=>{
        for(const nm of wb.SheetNames){ if(kws.every(k=>nm.includes(k))) return XLSX.utils.sheet_to_json(wb.Sheets[nm],{header:1,defval:'',raw:false}); }
        return null;
      };
      const summary=sheetByKw('インサイト','サマリ')||sheetByKw('サマリ');
      if(!summary){ toast('「インサイト情報サマリ」シートが見つかりませんでした。GMOのインサイト書き出しExcelをご確認ください。'); return; }
      // 対象月：サマリ先頭付近の "YYYY年M月" から
      let month=null;
      for(const r of summary.slice(0,4)){ for(const c of r){ const m=String(c).match(/(\d{4})\D+?(\d{1,2})\D*月/); if(m){ month=m[1]+'-'+String(parseInt(m[2],10)).padStart(2,'0'); break; } } if(month) break; }
      if(!month){ const p=SETTINGS.period; month=p.year+'-'+String(p.month).padStart(2,'0'); }
      const found={}; // code -> {views,web,tel,route,rating,reviews}
      const put=(code,key,val)=>{ if(val==null) return; (found[code]||(found[code]={}))[key]=val; };
      // --- サマリ：表示/ウェブ/電話/ルート（店舗が横並び） ---
      const LAB={views:'閲覧ユーザー', web:'ウェブサイト', tel:'電話をかける', route:'ルート'};
      const colMapOf=row=>{ const mp={}; for(let ci=0;ci<row.length;ci++){ const c=matchStoreCode(row[ci]); if(c) mp[ci]=c; } return mp; };
      let i=0;
      while(i<summary.length){
        const cm=colMapOf(summary[i]);
        if(Object.keys(cm).length>=3){
          let j=i+1;
          while(j<summary.length){
            const r2=summary[j];
            if(Object.keys(colMapOf(r2)).length>=3) break;
            const label=r2.join(' ');
            for(const key in LAB){ if(label.includes(LAB[key])){ for(const ci in cm){ put(cm[ci], key, xlNum(r2[ci])); } } }
            j++;
          }
          i=j; continue;
        }
        i++;
      }
      // --- クチコミ推移（単月)：平均評価・口コミ件数（対象月の列） ---
      const rev=sheetByKw('クチコミ','単月')||sheetByKw('クチコミ');
      if(rev){
        let mode=null; const mcol={};
        for(const r of rev){
          const joined=r.join('');
          if(joined.includes('平均点')) mode='rating';
          else if(joined.includes('件数')) mode='reviews';
          const mc=xlMonthCol(r, month);
          if(mc!=null && mode){ mcol[mode]=mc; continue; }
          if(mode && mcol[mode]!=null){ const code=xlRowStore(r); if(code) put(code, mode, xlNum(r[mcol[mode]])); }
        }
      }
      // --- DATA.monthly へマージ（既存の rank / comment は保持） ---
      let ok=0;
      for(const code in found){
        const g=found[code];
        if(!DATA.monthly[code]) DATA.monthly[code]={};
        const cur=DATA.monthly[code][month]||{};
        DATA.monthly[code][month]={
          views: g.views!=null?g.views:(cur.views??null),
          web:   g.web!=null?g.web:(cur.web??null),
          tel:   g.tel!=null?g.tel:(cur.tel??null),
          route: g.route!=null?g.route:(cur.route??null),
          rank:  cur.rank??null,
          reviews: g.reviews!=null?g.reviews:(cur.reviews??null),
          rating: g.rating!=null?g.rating.toFixed(1):(cur.rating??null),
          comment: cur.comment||''
        };
        ok++;
      }
      saveReports(); renderAll();
      toast(`✅ Excelから ${ok}店舗（${month}）を取り込みました。`);
    }catch(e){ toast('Excelの読み込みに失敗しました：'+(e&&e.message?e.message:e)); }
}
/* 月データを既存値を保持したままマージ（提供された項目だけ上書き） */
function mergeMonthly(code, month, g){
  if(!DATA.monthly[code]) DATA.monthly[code]={};
  const cur=DATA.monthly[code][month]||{};
  const pick=k=> (g[k]!=null?g[k]:(cur[k]!=null?cur[k]:null));
  DATA.monthly[code][month]={
    views:pick('views'), web:pick('web'), tel:pick('tel'), route:pick('route'),
    rank:pick('rank'), reviews:pick('reviews'),
    rating:(g.rating!=null?(typeof g.rating==='number'?g.rating.toFixed(1):g.rating):(cur.rating!=null?cur.rating:null)),
    comment:(g.comment!=null?g.comment:(cur.comment||''))
  };
}
/* ファイル名から期間 YYYYMMDD_YYYYMMDD を取り出す */
function reportFileRange(fname){
  const m=String(fname||'').match(/(\d{4})(\d{2})(\d{2})[_\-](\d{4})(\d{2})(\d{2})/);
  return m?{sy:+m[1],sm:+m[2],ey:+m[4],em:+m[5]}:null;
}
/* ファイル種別を判定して取込（.xlsx→Excel、CSVは中身で判別）。クリック選択・ドラッグ&ドロップ共通 */
function handleReportFile(f){
  if(!f) return;
  const n=(f.name||'').toLowerCase();
  if(n.endsWith('.xlsx')||n.endsWith('.xls')){ processReportExcelFile(f); return; }
  if(n.endsWith('.csv')){
    const rd=new FileReader();
    rd.onload=()=>{ const buf=rd.result; let text;
      try{ text=new TextDecoder('utf-8',{fatal:true}).decode(buf); }
      catch(e){ try{ text=new TextDecoder('shift-jis').decode(buf); }catch(e2){ text=new TextDecoder('utf-8').decode(buf); } }
      routeReportCSV(text, f.name||'');
    };
    rd.readAsArrayBuffer(f); return;
  }
  toast('対応していないファイルです。GMOのExcel(.xlsx)またはCSVを選んでください。');
}
/* CSVの中身を見て振り分け：kwrank順位／GMO insight数値／取込テンプレ */
function routeReportCSV(text, fname){
  const rows=parseCSV(text);
  if(!rows.length){ toast('データが読めませんでした。'); return; }
  const head=(rows[0]||[]).join(',');
  const head3=rows.slice(0,3).map(r=>r.join(',')).join(' ');
  if(head.includes('店舗名') && head.includes('キーワード')) return importKwRankRows(rows);
  if(head.includes('年月') && head.includes('店舗名')) return importInsightMonthlyRows(rows);
  if(head.includes('項目名') || head3.includes('閲覧ユーザー数')) return importInsightRows(rows, fname);
  return processReportCSVText(text);
}
/* GMO insight（クロス集計・Shift-JIS）：表示/ウェブ/電話/ルート/口コミ件数/評価点 */
function importInsightRows(rows, fname){
  const rng=reportFileRange(fname);
  if(rng && !(rng.sy===rng.ey && rng.sm===rng.em)){
    toast('このinsightは期間まとめ（複数月）の合計です。月ごとに割り当てできないため取り込みませんでした。1か月ずつ書き出すか、月次Excelをご利用ください（順位はkwrankから月別に入ります）。'); return;
  }
  let month = rng ? (rng.sy+'-'+String(rng.sm).padStart(2,'0'))
                  : (SETTINGS.period.year+'-'+String(SETTINGS.period.month).padStart(2,'0'));
  const r0=rows[0], colmap={};
  for(let ci=0;ci<r0.length;ci++){ const c=matchStoreCode(r0[ci]); if(c) colmap[ci]=c; }
  const LAB=[['views','全体閲覧ユーザー数'],['web','Webサイトアクション'],['tel','電話アクション'],['route','ルートアクション'],['reviews','クチコミ件数'],['rating','クチコミ評価点']];
  const found={};
  for(let r=1;r<rows.length;r++){
    const label=String(rows[r][0]||'');
    for(const [key,kw] of LAB){ if(label.indexOf(kw)>-1){ for(const ci in colmap){ const v=xlNum(rows[r][ci]); if(v!=null){ (found[colmap[ci]]||(found[colmap[ci]]={}))[key]=v; } } } }
  }
  let ok=0; for(const code in found){ mergeMonthly(code, month, found[code]); ok++; }
  saveReports(); renderAll();
  toast(`✅ insight CSVから ${ok}店舗（${month}）を取り込みました。`);
}
/* GMO insight（月別・1行=1店舗×1月）：年月と店舗名の行形式を月別に取り込む */
function importInsightMonthlyRows(rows){
  const hdr=rows[0]||[];
  let monthCol=-1, storeCol=-1;
  for(let ci=0;ci<hdr.length;ci++){ const h=String(hdr[ci]).trim();
    if(monthCol<0 && h==='年月') monthCol=ci;
    if(storeCol<0 && h==='店舗名') storeCol=ci; }
  if(monthCol<0) monthCol=0;
  if(storeCol<0) storeCol=1;
  const LAB=[['views','全体閲覧ユーザー数'],['web','Webサイトアクション'],['tel','電話アクション'],['route','ルートアクション'],['reviews','クチコミ件数'],['rating','クチコミ評価点']];
  const mcol={};
  for(let ci=0;ci<hdr.length;ci++){ const h=String(hdr[ci]); for(const [key,kw] of LAB){ if(mcol[key]==null && h.indexOf(kw)>-1) mcol[key]=ci; } }
  const months=new Set(); let ok=0;
  for(let r=1;r<rows.length;r++){
    const row=rows[r];
    const mm=String(row[monthCol]||'').match(/(\d{4})[\/\-年](\d{1,2})/);
    if(!mm) continue;
    const month=mm[1]+'-'+String(+mm[2]).padStart(2,'0');
    const code=matchStoreCode(row[storeCol]); if(!code) continue;
    const g={};
    for(const key in mcol){ const v=xlNum(row[mcol[key]]); if(v!=null) g[key]=v; }
    const act=(g.views||0)+(g.web||0)+(g.tel||0)+(g.route||0)+(g.reviews||0);
    if(act<=0) continue; // 開業前など全指標0の月は取り込まない
    mergeMonthly(code, month, g); months.add(month); ok++;
  }
  saveReports(); renderAll();
  toast(`✅ 月別insightから ${ok}件（${months.size}か月ぶん）を取り込みました。`);
}
/* GMO kwrank（日別順位）：店舗×月で平均し、平均KW順位を月別に反映 */
function importKwRankRows(rows){
  const hdr=rows[0], datecols=[];
  for(let ci=0;ci<hdr.length;ci++){ const m=String(hdr[ci]).trim().match(/^(\d{4})\/(\d{2})\/(\d{2})$/); if(m) datecols.push([ci, m[1]+'-'+m[2]]); }
  if(!datecols.length){ toast('kwrankの日付列が見つかりませんでした。'); return; }
  const acc={};
  for(let r=1;r<rows.length;r++){
    const code=matchStoreCode(rows[r][0]); if(!code) continue;
    for(const [ci,ym] of datecols){ const v=xlNum(rows[r][ci]); if(v!=null){ const k=code+'|'+ym; (acc[k]||(acc[k]=[0,0]))[0]+=v; acc[k][1]++; } }
  }
  const months=new Set(); let cells=0;
  for(const k in acc){ const a=acc[k]; if(!a[1]) continue; const p=k.split('|');
    mergeMonthly(p[0], p[1], {rank: Math.round(a[0]/a[1]*10)/10}); months.add(p[1]); cells++; }
  saveReports(); renderAll();
  toast(`✅ kwrankから平均KW順位を取り込みました（${months.size}か月・${cells}店舗月）。`);
}

function saveDraft(id){
  const p=DATA.schedule.find(x=>x.id===id); if(!p){ alert('対象の投稿が見つかりません。'); return; }
  p.title=el('postTitle')?el('postTitle').value:p.title;
  p.body =el('postBody') ?el('postBody').value :p.body;
  if(p.body && p.status==='未投稿') p.status='作成中';
  let spread=0;
  if(p.bodyKind==='common'){
    const cg=contentGroup(DATA.stores.find(x=>x.code===p.store));
    DATA.schedule.forEach(q=>{
      if(q.id===p.id||q.bodyKind!=='common'||q.date!==p.date) return;
      if(contentGroup(DATA.stores.find(x=>x.code===q.store))!==cg) return;
      q.title=p.title; q.body=p.body;
      if(q.body && q.status==='未投稿') q.status='作成中';
      spread++;
    });
  }
  saveSchedule(); renderPost(); renderDash();
  const cgName=contentGroup(DATA.stores.find(x=>x.code===p.store));
  toast(spread?`💾 保存し、同じ日の${cgName}${spread+1}店に反映しました。`:'💾 下書きを保存しました。');
}
/* 投稿管理CSVを取込（⑦＋⑧。投稿予定IDで突合・無ければ追加） */
function importScheduleCSV(){
  pickCSV(text=>{
    try{
      const rows=parseCSV(text); if(rows.length<2){ toast('データ行が見つかりませんでした。'); return; }
      const head=rows[0].map(h=>String(h).trim());
      const at=(...names)=>{ for(const n of names){ const i=head.indexOf(n); if(i>=0) return i; } return -1; };
      const ci={ id:at('投稿予定ID'), store:at('店舗','店舗名'), date:at('投稿予定日','投稿予定','予定日'),
        type:at('投稿タイプ','投稿タイプ'), status:at('ステータス','状態'), theme:at('備考','テーマ'),
        title:at('投稿タイトル','タイトル'), body:at('投稿内容','本文'),
        imgFile:at('画像ファイル名','ファイル名'), time:at('予約時間','投稿時間'), postMode:at('投稿方法') };
      const g=(row,i)=> i>=0 ? String(row[i]||'').trim() : '';
      let ok=0, ng=0;
      for(let r=1;r<rows.length;r++){
        const row=rows[r];
        const code=resolveStoreCode(g(row,ci.store));
        if(!code){ ng++; continue; }
        let id=g(row,ci.id);
        const date=g(row,ci.date), type=g(row,ci.type)||'最新情報';
        if(!id) id=makePostId(code,date,type);
        const ex=DATA.schedule.find(p=>p.id===id);
        const obj={ id, store:code, type, date, theme:g(row,ci.theme),
          status:g(row,ci.status)||'未投稿', img:(ex&&ex.img)||'📝',
          title:g(row,ci.title), body:g(row,ci.body),
          imgFile:g(row,ci.imgFile)||(ex&&ex.imgFile)||'',
          time:g(row,ci.time)||(ex&&ex.time)||'',
          postMode:g(row,ci.postMode)||(ex&&ex.postMode)||'予約' };
        if(ex) Object.assign(ex,obj); else DATA.schedule.push(obj);
        ok++;
      }
      saveSchedule(); renderAll();
      toast(`✅ 投稿 ${ok}件を取り込みました${ng?`（${ng}件はスキップ）`:''}。`);
    }catch(e){ toast('CSVの読み込みに失敗しました。'); }
  });
}

/* 指標値を表示文字列に整形（rank=○位／rating=小数1桁／他=桁区切り＋単位） */

/* 差分ピル（cur vs cmp、指標の良い向きを考慮） */
function deltaPill(metricKey, cur, cmp, tag){
  cur=cur==null||cur===''?null:Number(cur); cmp=cmp==null||cmp===''?null:Number(cmp);
  if(cmp==null||cur==null||isNaN(cur)||isNaN(cmp)) return `<span class="t">${tag}</span><span class="pill flat">—</span>`;
  const M=METRICS[metricKey], better=M.better;
  let imp = better==="low" ? (cmp-cur) : (cur-cmp);   // プラス＝改善
  const av = M.decimal ? Math.abs(imp).toFixed(1) : Math.abs(imp).toLocaleString();
  let cls = imp>0?"up":(imp<0?"down":"flat");
  let arrow = imp>0?"▲":(imp<0?"▼":"±");
  return `<span class="t">${tag}</span><span class="pill ${cls}">${arrow}${av}${M.unit}</span>`;
}

/* タッチ操作：横スワイプでサブ切替、グリップを下スワイプで閉じる */
(function bindGestures(){
  const track=()=>el('subTrack');
  const vp=()=>el('trackVp');
  let sx=0,sy=0,dragging=false,horiz=null;
  vp.call&&0;
  document.addEventListener('DOMContentLoaded',()=>{});
  function tStart(e){const t=e.touches[0];sx=t.clientX;sy=t.clientY;dragging=true;horiz=null;}
  function tMove(e){
    if(!dragging)return;const t=e.touches[0];const dx=t.clientX-sx,dy=t.clientY-sy;
    if(horiz===null){ if(Math.abs(dx)>10||Math.abs(dy)>10) horiz=Math.abs(dx)>Math.abs(dy); }
    if(horiz){ e.preventDefault();
      track().style.transition='none';
      track().style.transform=`translateX(calc(-${SUB*SUB_STEP}% + ${dx*0.5}px))`;
    }
  }
  function tEnd(e){
    if(!dragging)return;dragging=false;
    const ch=e.changedTouches[0];const dx=ch.clientX-sx,dy=ch.clientY-sy;
    track().style.transition='';
    if(horiz){
      if(Math.abs(dx)>55){ goSub(SUB + (dx<0?1:-1)); } else { goSub(SUB); }
    }
  }
  // グリップ部：下スワイプで閉じる
  function gStart(e){const t=e.touches[0];sx=t.clientX;sy=t.clientY;dragging=true;}
  function gMove(e){ if(!dragging)return; const t=e.touches[0]; const dy=t.clientY-sy;
    if(dy>0){ e.preventDefault(); el('navPanel').style.transform=`translateY(${dy}px)`; } }
  function gEnd(e){ if(!dragging)return;dragging=false; const dy=e.changedTouches[0].clientY-sy;
    el('navPanel').style.transform=''; if(dy>90) closePanel(); }
  window.addEventListener('load',()=>{
    const v=el('trackVp'), g=el('grabHandle');
    v.addEventListener('touchstart',tStart,{passive:true});
    v.addEventListener('touchmove',tMove,{passive:false});
    v.addEventListener('touchend',tEnd);
    g.addEventListener('touchstart',gStart,{passive:true});
    g.addEventListener('touchmove',gMove,{passive:false});
    g.addEventListener('touchend',gEnd);
  });
})();

/* SVG折れ線/棒/面グラフ（各点にホバー/タップで数値ツールチップ） */
function buildChart(vals, labels, type, color, better, metricKey){
  const W=340,H=150,padL=10,padR=10,padT=12,padB=24;
  const iw=W-padL-padR, ih=H-padT-padB, n=vals.length;
  const nums=vals.filter(v=>v!=null);
  let mn=nums.length?Math.min(...nums):0, mx=nums.length?Math.max(...nums):1;
  if(mn===mx){mn-=1;mx+=1;}
  const pad=(mx-mn)*0.12; mn-=pad; mx+=pad;
  const X=i=> padL + (n<=1?iw/2 : i*iw/(n-1));
  const Y=v=>{ let t=(v-mn)/(mx-mn); if(better==="low") t=1-t; return padT+(1-t)*ih; };
  const base=padT+ih;
  let body="";
  let grid="";
  for(let g=0;g<=3;g++){const gy=padT+ih*g/3;grid+=`<line x1="${padL}" y1="${gy}" x2="${W-padR}" y2="${gy}" stroke="#eef1f5"/>`;}
  if(type==="bar"){
    const bw=Math.min(20, iw/n*0.6);
    body=vals.map((v,i)=>{ if(v==null)return ''; const x=X(i)-bw/2,y=Y(v);return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${(base-y).toFixed(1)}" rx="3" fill="${color}"/>`;}).join("");
  } else {
    const pts=vals.map((v,i)=>v==null?null:`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).filter(Boolean).join(" ");
    if(type==="area"){
      body+=`<polygon points="${padL},${base} ${pts} ${W-padR},${base}" fill="${color}" fill-opacity="0.16"/>`;
    }
    body+=`<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
    body+=vals.map((v,i)=>v==null?'':`<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="3" fill="#fff" stroke="${color}" stroke-width="2"/>`).join("");
  }
  // 透明の当たり判定列（ホバー/タップで値ツールチップ）＋アクティブ点ハイライト
  const colw = n>1 ? iw/(n-1) : iw;
  const hits=vals.map((v,i)=>{
    const txt = (v==null? labels[i]+'：データなし' : labels[i]+'：'+fmtMetric(metricKey,v));
    const cx=X(i), top = v==null? base : Y(v);
    return `<g class="hit" onmousemove="chartTip(event,'${esc(txt)}')" onmouseleave="chartTipHide()" ontouchstart="chartTip(event,'${esc(txt)}')">
      <rect x="${(cx-colw/2).toFixed(1)}" y="${padT}" width="${colw.toFixed(1)}" height="${ih}" fill="transparent"/>

function buildTrendChart(){
  const stores=trendStoresInScope();
  const mkey=SETTINGS.trendMetric, better=METRICS[mkey].better;
  const keys=trailing12(SETTINGS.period.year,SETTINGS.period.month);
  const labels=keys.map(kk=>Number(kk.split("-")[1])+"月");
  const visible=stores.filter(s=>!SETTINGS.trendHidden[s.code]);
  // 表示店舗の値からY軸レンジ
  let all=[];
  visible.forEach(s=>keys.forEach(kk=>{const v=mv(getM(s.code,kk),mkey); if(v!=null)all.push(v);}));
  let mn=all.length?Math.min(...all):0, mx=all.length?Math.max(...all):1;
  if(mn===mx){mn-=1;mx+=1;} const pd=(mx-mn)*0.1; mn-=pd; mx+=pd;
  const W=340,H=190,padL=10,padR=10,padT=12,padB=24;
  const iw=W-padL-padR, ih=H-padT-padB, n=keys.length;
  const X=i=> padL + (n<=1?iw/2 : i*iw/(n-1));
  const Y=v=>{ let t=(v-mn)/(mx-mn); if(better==="low") t=1-t; return padT+(1-t)*ih; };
  let grid="";
  for(let g=0;g<=3;g++){const gy=padT+ih*g/3;grid+=`<line x1="${padL}" y1="${gy}" x2="${W-padR}" y2="${gy}" stroke="#eef1f5"/>`;}
  let lines="";
  visible.forEach(s=>{
    const c=colorFor(s);
    const pts=keys.map((kk,i)=>{const v=mv(getM(s.code,kk),mkey); return v==null?null:`${X(i).toFixed(1)},${Y(v).toFixed(1)}`;}).filter(Boolean).join(" ");
    if(pts) lines+=`<polyline points="${pts}" fill="none" stroke="${c}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" opacity="0.9"/>`;
  });
  const xl=labels.map((l,i)=> (i%2===0||i===n-1)?`<text x="${X(i).toFixed(1)}" y="${H-7}" font-size="9" fill="#6b7280" text-anchor="middle">${l}</text>`:"").join("");
  const svg=`<svg viewBox="0 0 ${W} ${H}" role="img" style="width:100%;height:auto">${grid}${lines}${xl}</svg>`;

  const legend=stores.map(s=>{

      <span class="dotc" style="background:${c}"></span>${esc(shortName(s.name))}</button>`;

  const scopeLbl = SETTINGS.trendScope==='all'?'全店舗':SETTINGS.trendScope;
  return `<div class="card span2">
    <div class="row between mb" style="flex-wrap:wrap;gap:8px">
      <h2 style="margin:0">📊 店舗別 年間推移</h2>
      <div class="row" style="gap:8px;flex-wrap:wrap">
        <span class="selstep"><button onclick="setTrendScope(-1)" title="前へ">◀</button><span class="segval">${esc(scopeLbl)}</span><button onclick="setTrendScope(1)" title="次へ">▶</button></span>
        <span class="selstep"><button onclick="setTrendMetric(-1)" title="前へ">◀</button><span class="segval">${METRICS[mkey].icon}${METRICS[mkey].label}</span><button onclick="setTrendMetric(1)" title="次へ">▶</button></span>

    ${all.length?svg:'<p class="sub">この範囲・指標のデータがまだありません。月次レポートを取り込むと表示されます。</p>'}

  </div>`;

function chartTip(ev, text){
  let tip=el('chartTip');
  if(!tip){ tip=document.createElement('div'); tip.id='chartTip'; tip.className='charttip'; document.body.appendChild(tip); }
  tip.textContent=text; tip.style.display='block';
  const p = ev.touches&&ev.touches[0] ? ev.touches[0] : ev;
  const x=p.clientX, y=p.clientY;
  tip.style.left=Math.min(window.innerWidth-tip.offsetWidth-8, Math.max(8, x - tip.offsetWidth/2))+'px';
  tip.style.top=Math.max(8, y - tip.offsetHeight - 14)+'px';
  clearTimeout(chartTip._t); chartTip._t=setTimeout(chartTipHide, 2600); // スマホ：少し経つと消す
  if(ev.cancelable && ev.type==='touchstart') ev.preventDefault();
}

function buildPostStatusCard(s){
  const list=DATA.schedule.filter(p=>p.store===s.code);

  // 次の作成テーマ＝今日以降で未投稿のうち最も近い予定
  const todayStr=`${TODAY.y}-${String(TODAY.m).padStart(2,'0')}-${String(TODAY.d).padStart(2,'0')}`;
  const upcoming=list.filter(p=>p.status!=='投稿済').sort((a,b)=>a.date<b.date?-1:1);

    return `<div class="postcol"><div class="postcol-hd">${kind}</div>
      <div class="poststatus">

const INTEG_COLS=["views","web","tel","route","reviews","rating"]; // 月別モードの表示列
function setIntegMode(delta){

}
function setIntegMetric(delta){

  i=(i+delta+CHART_KEYS.length)%CHART_KEYS.length; SETTINGS.integMetric=CHART_KEYS[i]; renderDash();

function integGroupHeaderRow(cols){

// 月別モード：現在月の全指標を店舗ごとに（グループ別に区切り）
function integMonthTable(k,kp){
  const reaction=m=> (mv(m,'web')||0)+(mv(m,'tel')||0)+(mv(m,'route')||0);
  const cell=(x,key)=>{
    const m=getM(x.code,k), mp=getM(x.code,kp);
    const cur=mv(m,key), prev=mv(mp,key);
    if(cur==null) return '<td>—</td>';
    const dv=(prev!=null)?cur-prev:null;
    const better=METRICS[key].better;
    const good=dv==null?'flat':(dv>0?(better==='low'?'down':'up'):(dv<0?(better==='low'?'up':'down'):'flat'));
    const dPill=dv==null||dv===0?'':`<span class="pill ${good}" style="margin-left:4px">${dv>0?'▲':'▼'}${Math.abs(dv).toLocaleString()}</span>`;
    return `<td>${fmtMetric(key,cur)}${dPill}</td>`;
  };
  const head=`<tr><th>店舗</th>${INTEG_COLS.map(key=>`<th>${METRICS[key].icon}${METRICS[key].label}</th>`).join("")}<th>反応数</th></tr>`;
  let body="";
  CONTENT_GROUPS.forEach(g=>{
    const list=DATA.stores.filter(x=>contentGroup(x)===g);
    if(!list.length) return;
    const gc=CONTENT_COLORS[g]||"#888";
    body+=`<tr class="grprow"><td colspan="${INTEG_COLS.length+2}"><i class="gdot" style="background:${gc}"></i><b>${esc(g)}</b>（${list.length}店）</td></tr>`;
    list.forEach(x=>{
      const m=getM(x.code,k); const react=m?reaction(m):null;
      const isSel=x.code===CURRENT_STORE;
      body+=`<tr onclick="selectStore('${x.code}')" style="cursor:pointer${isSel?';background:#f0f5ff':''}">
        <td><i class="gdot" style="background:${colorFor(x)}"></i>${esc(shortName(x.name))}</td>
        ${INTEG_COLS.map(key=>cell(x,key)).join("")}
        <td>${react==null?'—':react.toLocaleString()+'回'}</td></tr>`;
    });
  });
  return `<div class="tablewrap mt"><table class="alltbl integ"><thead>${head}</thead><tbody>${body}</tbody></table></div>
    <p class="sub mt">前月比を▲▼で表示（指標の性質にあわせ、良い変化を緑にしています）。反応数＝電話＋ルート＋webの合計。行タップでその店舗に切り替わります。横スクロールできます。</p>`;
}
// 項目別モード：1指標を直近12か月マトリクスで（グループ別に区切り）
function integMetricTable(){
  const mkey=SETTINGS.integMetric;
  const keys=trailing12(SETTINGS.period.year,SETTINGS.period.month);
  const labels=keys.map(kk=>Number(kk.split("-")[1])+"月");
  const head=`<tr><th>店舗</th>${labels.map(l=>`<th>${l}</th>`).join("")}</tr>`;
  let body="";
  CONTENT_GROUPS.forEach(g=>{
    const list=DATA.stores.filter(x=>contentGroup(x)===g);
    if(!list.length) return;
    const gc=CONTENT_COLORS[g]||"#888";
    body+=`<tr class="grprow"><td colspan="${keys.length+1}"><i class="gdot" style="background:${gc}"></i><b>${esc(g)}</b>（${list.length}店）</td></tr>`;
    list.forEach(x=>{
      const isSel=x.code===CURRENT_STORE;
      const cells=keys.map((kk,i)=>{
        const v=mv(getM(x.code,kk),mkey);
        const isCur=(i===keys.length-1);
        return `<td${isCur?' style="font-weight:800"':''}>${v==null?'—':fmtMetric(mkey,v)}</td>`;
      }).join("");
      body+=`<tr onclick="selectStore('${x.code}')" style="cursor:pointer${isSel?';background:#f0f5ff':''}">
        <td><i class="gdot" style="background:${colorFor(x)}"></i>${esc(shortName(x.name))}</td>${cells}</tr>`;
    });
  });
  return `<div class="tablewrap mt"><table class="alltbl integ"><thead>${head}</thead><tbody>${body}</tbody></table></div>
    <p class="sub mt">直近12か月・${METRICS[mkey].icon}${METRICS[mkey].label}。右端（太字）が対象月です。横スクロールできます。行タップでその店舗に切り替わります。</p>`;
}
function buildAllStoreTable(k,kp){
  if(!hasReportData()) return '';
  return SETTINGS.integMode==='metric' ? integMetricTable() : integMonthTable(k,kp);
}

/* ===== 活動カレンダー生成 ===== */
function buildActivityCalendar(s){
  const y=SETTINGS.period.year, mo=SETTINGS.period.month;
  const startDow=new Date(y,mo-1,1).getDay();
  const days=new Date(y,mo,0).getDate();
  const dows=['日','月','火','水','木','金','土'];
  let html=dows.map(d=>`<div class="dow">${d}</div>`).join('');
  for(let i=0;i<startDow;i++) html+=`<div class="cell muted"></div>`;
  let postCount=0, planCount=0;
  for(let d=1;d<=days;d++){
    const dow=new Date(y,mo-1,d).getDay();
    const isPostDay=(dow===1||dow===5); // ⑤定期投稿：月・金
    const past=(y<TODAY.y)||(y===TODAY.y&&mo<TODAY.m)||(y===TODAY.y&&mo===TODAY.m&&d<=TODAY.d);
    const isToday=(y===TODAY.y&&mo===TODAY.m&&d===TODAY.d);
    let ev='';
    if(isPostDay){
      if(past){postCount++;ev+=`<span class="ev post">✓投稿</span>`;}
      else {planCount++;ev+=`<span class="ev plan">投稿予定</span>`;}
    }
    if(SHOW_REPORT_CAL && d===1) ev+=`<span class="ev rep">📊前月分抽出</span>`;
    if(SHOW_REPORT_CAL && d===28) ev+=`<span class="ev rep">📋レポート作成</span>`;
    html+=`<div class="cell${isToday?' today':''}"><span class="dnum">${d}</span>${ev}</div>`;
  }
  // 次回レポート抽出予定＝翌月1日
  let ny=y, nm=mo+1; if(nm>12){nm=1;ny++;}
  return {html, postCount, planCount, nextReport:`${ny}年${nm}月1日`};
}

/* ===== レポートまとめ サマリーボックス ===== */
function renderReportSummaryBoxes(k,kp){
  let sumViews=0,sumCTA=0,sumReviews=0,ratingSum=0,ratingN=0,improved=0,worsened=0,nStore=0;
  const cta=SETTINGS.targetCTA; let bestStore=null,bestGain=-Infinity;
  DATA.stores.forEach(x=>{const m=getM(x.code,k),mp=getM(x.code,kp);if(!m)return; nStore++;
    sumViews+=(mv(m,'views')||0); sumCTA+=(mv(m,cta)||0); sumReviews+=(mv(m,'reviews')||0);
    const rt=mv(m,'rating'); if(rt!=null){ratingSum+=rt; ratingN++;}
    const cv=mv(m,'views'), pv=mv(mp,'views');
    if(cv!=null&&pv!=null){ if(cv>pv)improved++; else if(cv<pv)worsened++; }
    const cc=mv(m,cta), pc=mv(mp,cta);
    if(cc!=null&&pc!=null){ const gain=cc-pc; if(gain>bestGain){bestGain=gain;bestStore=x;} }
  });
  const avgRating=ratingN?(ratingSum/ratingN).toFixed(2):'—';
  const box=(t,v,s)=>`<div class="sumbox"><div class="t">${t}</div><div class="v">${v}</div><div class="s">${s||''}</div></div>`;
  return [
    box('全店 合計表示回数', sumViews.toLocaleString()+'回', `稼働 ${nStore}店`),
    box('全店 合計'+METRICS[cta].label, sumCTA.toLocaleString()+'回', '目標CTAの合計'),
    box('口コミ 合計', sumReviews.toLocaleString()+'件', '累計'),
    box('全店 平均評価', '⭐'+avgRating, '高いほど良い'),
    box('表示が伸びた店舗', improved+'店', '前月より表示UP'),
    box('要注意（減少）', worsened+'店', '前月より表示DOWN'),
    box('今月いちばん伸びた店舗', bestStore?esc(shortName(bestStore.name)):'—', bestStore?('＋'+bestGain.toLocaleString()+' '+METRICS[cta].label):''),
  ].join("");
}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

投稿予定日,予約時間,投稿方法,店舗グループ,投稿タイプ,テーマ,備考

/* ===== 一括投稿テンプレ（バッチ） =====
   composerから「送る」と、GMO48列に対応した行をブラウザに貯めます（localStorage）。
   貯めた分はNotion⑥DBと同じ並びのCSVで書き出し、meo-export.htmlに渡せます。 */
const BATCH_KEY='meo_batch_v1';
function batchLoad(){ try{return JSON.parse(localStorage.getItem(BATCH_KEY)||'[]');}catch(e){return [];} }
function batchSave(arr){ localStorage.setItem(BATCH_KEY, JSON.stringify(arr)); }
function batchCount(){ return batchLoad().length; }
function sendToBatch(id){
  const p=DATA.schedule.find(x=>x.id===id);
  if(!p){ alert('対象の投稿が見つかりません。'); return; }
  const st=DATA.stores.find(x=>x.code===p.store);
  const title=el('postTitle')?el('postTitle').value.trim():'';
  const body=el('postBody')?el('postBody').value.trim():'';
  if(!body){
    if(!confirm('本文がまだ空です。このまま一括テンプレに送りますか？\n（あとでNotion⑥DB側で入れ直すこともできます）')) return;
  }
  const imgFile=el('postImgFile')?el('postImgFile').value.trim():p.imgFile||'';
  const isImmediate=(p.postMode==='即時');
  const isCommon=(p.bodyKind==='common');
  const btnUrl=isCommon?'':storePostUrl(p.store);
  const row={
    '投稿予定ID': p.id,
    '店舗': st?st.name:p.store,
    '投稿ステータス': '下書き',
    '備考': p.theme||'',
    '店舗ID': st&&st.gmoId?st.gmoId:'',
    '店舗名': st?st.name:p.store,
    '投稿タイプ': p.type||'最新情報',
    '下書き保存': '○',
    '即時投稿': isImmediate?'○':'',
    '予約投稿日': !isImmediate?(p.date||''):'',
    '予約投稿時間': !isImmediate?(p.time||''):'',
    'タイトル(GoogleとSNSは任意入力、Yahoo!は必須）': title||p.title||'',
    '投稿内容': body||p.body||'',
    '投稿内容２': '',
    '画像': imgFile,
    'ボタンの追加': (isCommon||!btnUrl)?'なし':'予約',
    'ボタンURL': btnUrl
  };
  const arr=batchLoad();
  const i=arr.findIndex(r=>r['投稿予定ID']===p.id);
  if(i>=0){ arr[i]=row; } else { arr.push(row); }
  batchSave(arr);
  const warnId = (!row['店舗ID'])?'\n\n⚠️ この店舗のGMO店舗IDが未登録です。Notion③店舗要項DBで登録すると、GMOで弾かれにくくなります。':'';
  toast('📦 一括テンプレに追加しました（現在 '+arr.length+' 件）'+(warnId?' ※要確認':''));
  if(warnId) setTimeout(()=>alert('一括テンプレに追加しました（'+arr.length+'件）。'+warnId),50);
}
function batchClear(){
  if(!batchCount()){ toast('一括テンプレは空です。'); return; }
  if(confirm('貯めた一括テンプレ（'+batchCount()+'件）を空にしますか？')){ batchSave([]); toast('一括テンプレを空にしました。'); renderSchedule&&renderSchedule(); }
}
function batchExportCSV(){
  const arr=batchLoad();
  if(!arr.length){ alert('一括テンプレが空です。先にcomposerから「📦 一括テンプレに送る」してください。'); return; }
  const cols=['投稿予定ID','店舗','投稿ステータス','備考','店舗ID','店舗名','投稿タイプ','下書き保存','即時投稿','予約投稿日','予約投稿時間','タイトル(GoogleとSNSは任意入力、Yahoo!は必須）','投稿内容','投稿内容２','画像','ボタンの追加','ボタンURL'];
  const q=v=>{ v=(v==null?'':String(v)); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; };
  const lines=[cols.join(',')].concat(arr.map(r=>cols.map(c=>q(r[c])).join(',')));
  const csv='\ufeff'+lines.join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const d=new Date(); const ymd=d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
  a.href=url; a.download='一括投稿テンプレ_'+ymd+'.csv'; document.body.appendChild(a); a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },100);
  toast('⬇️ CSVを書き出しました（'+arr.length+'件）。次はGMO書き出しツールで読み込んでください。');
}
function updCount(){
  const t=el('postBody'); if(!t)return;

  c.className='cnt '+(n>=250&&n<=350?'good':(n>350?'bad':''));
}

function linksExportCSV(){

async function notionCall(payload){
  const headers={'Content-Type':'application/json'};
  const secret=(localStorage.getItem('meo_notion_secret')||'').trim();
  if(secret) headers['x-app-secret']=secret;
  const r=await fetch(notionProxy(),{method:'POST',headers,body:JSON.stringify(payload)});
  const t=await r.text(); let d; try{ d=t?JSON.parse(t):{}; }catch(e){ d={raw:t}; }
  if(!r.ok){ throw new Error((d&&d.error)||(d&&d.message)||('HTTP '+r.status)); }
  return d;
}
async function queryAllRows(ds){
  const out=[]; let cursor=null, guard=0;
  do{ const body={page_size:100}; if(cursor) body.start_cursor=cursor;
    const res=await notionCall({op:'query',ds,body});
    (res.results||[]).forEach(x=>out.push(x));
    cursor=res.has_more?res.next_cursor:null; guard++;
  }while(cursor && guard<25);
  return out;
}
function mapBy(rows,prop,kind){ const m={}; rows.forEach(pg=>{ const c=pg.properties&&pg.properties[prop];
  const v=kind==='title'?(c&&c.title&&c.title[0]&&c.title[0].plain_text):(c&&c.rich_text&&c.rich_text[0]&&c.rich_text[0].plain_text);
  if(v) m[v.trim()]=pg.id; }); return m; }
function pTitle(pr,n){ const c=pr&&pr[n]; return (c&&c.title&&c.title[0]&&c.title[0].plain_text)||''; }
function pText(pr,n){ const c=pr&&pr[n]; return (c&&c.rich_text&&c.rich_text[0]&&c.rich_text[0].plain_text)||''; }
function pSel(pr,n){ const c=pr&&pr[n]; return (c&&c.select&&c.select.name)||''; }
function pUrl(pr,n){ const c=pr&&pr[n]; return (c&&c.url)||''; }
function pNum(pr,n){ const c=pr&&pr[n]; return (c&&typeof c.number==='number')?c.number:0; }
function pRel0(pr,n){ const c=pr&&pr[n]; return (c&&c.relation&&c.relation[0]&&c.relation[0].id)||''; }

const SCH_SEP='\n〔MEO同期データ・編集しないでください〕';
function encSchNote(p){
  const extra={ k:p.bodyKind||'store', t:p.title||'', b:p.body||'', f:p.imgFile||'', m:p.postMode||'' };
  return String(p.theme||'')+SCH_SEP+JSON.stringify(extra);
}
function decSchNote(raw){
  raw=String(raw||''); const i=raw.indexOf(SCH_SEP);
  if(i<0) return { theme:raw };
  let extra={}; try{ extra=JSON.parse(raw.slice(i+SCH_SEP.length)); }catch(e){}
  return { theme:raw.slice(0,i), bodyKind:extra.k, title:extra.t, body:extra.b, imgFile:extra.f, postMode:extra.m };
}

      const props={ '投稿予定ID':{title:[{text:{content:p.id||''}}]} };
      if(p.date) props['投稿予定日']={date:{start:(p.time?(p.date+'T'+p.time+':00'):p.date)}};
      if(p.type) props['投稿タイプ']={select:{name:p.type}};
      if(p.status) props['ステータス']={select:{name:p.status}};
      props['備考']={rich_text:[{text:{content:encSchNote(p).slice(0,1990)}}]};
      const sp=_storeMap[p.store]; if(sp) props['店舗']={relation:[{id:sp}]};
      try{ if(existing[p.id]) await notionCall({op:'update',pageId:existing[p.id],properties:props});
           else await notionCall({op:'create',ds:NOTION.ds.schedule,properties:props}); ok++; }
      catch(e){ ng++; }
    }
    setSyncMsg('sch','完了：'+ok+'件送信'+(ng?'／'+ng+'件失敗':'')); toast('✅ 投稿予定をNotionへ送信しました');
  }catch(e){ setSyncMsg('sch','失敗：'+e.message); }
}
async function syncSchedulePull(){
  setSyncMsg('sch','取得中…');
  try{
    await loadStoreMaps();
    const rows=await queryAllRows(NOTION.ds.schedule); let n=0;
    rows.forEach(pg=>{ const pr=pg.properties; const id=pTitle(pr,'投稿予定ID'); if(!id) return;
      const dRaw=(pr['投稿予定日']&&pr['投稿予定日'].date&&pr['投稿予定日'].date.start)||'';
      let date=dRaw,time=''; if(dRaw.indexOf('T')>=0){ date=dRaw.slice(0,10); time=dRaw.slice(11,16); }
      const code=_storeInv[pRel0(pr,'店舗')]||'';
      const dec=decSchNote(pText(pr,'備考'));
      const obj={ id, store:code, type:pSel(pr,'投稿タイプ'), date, time, status:pSel(pr,'ステータス')||'未投稿',
        theme:dec.theme||'', bodyKind:dec.bodyKind||'store' };
      if(dec.title!=null) obj.title=dec.title;
      if(dec.body!=null) obj.body=dec.body;
      if(dec.imgFile!=null) obj.imgFile=dec.imgFile;
      obj.postMode=dec.postMode||(time?'予約':'即時');
      const ex=DATA.schedule.find(x=>x.id===id);
      if(ex){ Object.assign(ex,obj); } else { obj.img='📝'; if(obj.title==null)obj.title=''; if(obj.body==null)obj.body=''; if(obj.imgFile==null)obj.imgFile=''; DATA.schedule.push(obj); }
      n++; });
    saveSchedule(); renderPost(); setSyncMsg('sch','取得：'+n+'件'); toast('✅ Notionから投稿予定を取得しました');
  }catch(e){ setSyncMsg('sch','失敗：'+e.message); }
}

const SCOPE2JP={global:'全体',group:'グループ',store:'店舗'};
const JP2SCOPE={'全体':'global','グループ':'group','店舗':'store'};
async function syncLinksPush(){
  setSyncMsg('lnk','送信中…');
  try{
    const existing=mapBy(await queryAllRows(NOTION.ds.links),'リンクID','text');
    let ok=0,ng=0,i=0;
    for(const l of LINKS){ i++;
      const props={ 'リンク名':{title:[{text:{content:l.label||'リンク'}}]},
        'リンクID':{rich_text:[{text:{content:l.id||''}}]},
        '対象範囲':{select:{name:SCOPE2JP[l.scope]||'全体'}},
        '表示順':{number:i} };
      if(l.url) props['URL']={url:l.url};
      if(l.cat) props['区分']={select:{name:(['GMO','GBP','画像'].indexOf(l.cat)>=0?l.cat:'その他')}};
      if(l.key) props['対象キー']={rich_text:[{text:{content:l.key}}]};
      try{ if(existing[l.id]) await notionCall({op:'update',pageId:existing[l.id],properties:props});
           else await notionCall({op:'create',ds:NOTION.ds.links,properties:props}); ok++; }
      catch(e){ ng++; }
    }
    setSyncMsg('lnk','完了：'+ok+'件送信'+(ng?'／'+ng+'件失敗':'')); toast('✅ リンク集をNotionへ送信しました');
  }catch(e){ setSyncMsg('lnk','失敗：'+e.message); }
}
async function syncLinksPull(){
  setSyncMsg('lnk','取得中…');
  try{
    const rows=await queryAllRows(NOTION.ds.links); const inc=[];
    rows.forEach(pg=>{ const pr=pg.properties;
      inc.push({ id:pText(pr,'リンクID')||('L'+pg.id.slice(0,8)), label:pTitle(pr,'リンク名')||'リンク', url:pUrl(pr,'URL'),
        scope:JP2SCOPE[pSel(pr,'対象範囲')]||'global', key:pText(pr,'対象キー'), cat:pSel(pr,'区分')||'その他', ord:pNum(pr,'表示順') }); });
    if(!inc.length){ setSyncMsg('lnk','Notionにリンクがありません'); return; }
    inc.sort((a,b)=>a.ord-b.ord);
    LINKS=inc.map(function(o){ return {id:o.id,label:o.label,url:o.url,scope:o.scope,key:o.key,cat:o.cat}; });
    linksSave(); renderLinks(); setSyncMsg('lnk','取得：'+inc.length+'件'); toast('✅ Notionからリンク集を取得しました');
  }catch(e){ setSyncMsg('lnk','失敗：'+e.message); }
}

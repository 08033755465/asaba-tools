// ============ 画像圧縮（チーム共有設定） ============
// 設定はFirestore settings/compress: { maxSize: 長辺px(0=原寸), quality: 0.5〜0.9 }
const COMPRESS_DEFAULT = { maxSize: 1200, quality: 0.7 };
async function getCompressSettings() {
  try {
    if (db) {
      const s = await getDoc(docRefFn('settings', 'compress'));
      if (s.exists()) return { ...COMPRESS_DEFAULT, ...s.data() };
    }
  } catch (e) { console.warn('compress settings', e); }
  return { ...COMPRESS_DEFAULT };
}
// dataURL → 長辺maxSizeに縮小し、JPEG(quality)で再圧縮したdataURLを返す
function compressDataUrl(srcUrl, maxSize, quality) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      const long = Math.max(w, h);
      if (maxSize && long > maxSize) { const r = maxSize / long; w = Math.round(w * r); h = Math.round(h * r); }
      const c = document.createElement('canvas'); c.width = w; c.height = h;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, w, h); // 透過PNG対策で白背景
      ctx.drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => reject(new Error('画像を読み込めませんでした'));
    img.src = srcUrl;
  });
}
function dataUrlKb(u) { return Math.round((u.length - u.indexOf(',') - 1) * 3 / 4 / 1024); }

// { gasUrl, perAccount: { [accountId]: { enabled, emails } } }
async function sendGalleryNotify({ accountId, accountName, categoryName, folderName }) {
  try {
    if (!db) return;
    const snap = await getDoc(docRefFn('settings', 'notify'));
    if (!snap.exists()) return;
    const s = snap.data();
    const acc = (s.perAccount || {})[accountId];
    if (!s.gasUrl || !acc || !acc.enabled || !(acc.emails || '').trim()) return;
    await fetch(s.gasUrl, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        type: 'gallery_saved',
        emails: acc.emails,
        account: accountName, category: categoryName, title: folderName,
        when: new Date().toLocaleString('ja-JP'),
      }),
    });
  } catch (e) { console.error('notify error', e); }
}

// ============ Helpers ============
function sanitizePart(s) { return String(s ?? '').replace(/[\\\/*?"<>|]/g, '_').replace(/[:：]/g, '‐').trim(); }
function buildFolderName({ accountName, categoryName, date, memo }) {
  const acc = sanitizePart(accountName) || '未分類';
  const cat = sanitizePart(categoryName) || '未分類';
  const m = sanitizePart(memo);
  let s = `${acc}：${cat}_${date || ''}`;
  if (m) s += `_${m}`;
  return s;
}
function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function isoToMMDD(iso) {
  if (!iso) return '';
  const p = iso.split('-'); return p.length === 3 ? `${p[1]}-${p[2]}` : '';
}
function fmtDateTime(ms) {
  if (!ms) return '';
  return new Date(ms).toLocaleString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
}
async function copyToClipboard(text) {
  try { await navigator.clipboard.writeText(text); return true; }
  catch {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    return true;
  }
}
function useLocalStorage(key, initial) {
  const [v, setV] = useState(() => {
    try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : initial; } catch { return initial; }
  });
  useEffect(() => { try { localStorage.setItem(key, JSON.stringify(v)); } catch {} }, [key, v]);
  return [v, setV];
}

// ============ CompressSection（画質設定＋一括圧縮） ============
function CompressSection({ showToast }) {
  const [cfg, setCfg] = useState(null);
  const [busy, setBusy] = useState(false);
  const [progress, setProgress] = useState('');
  const fileRef = useRef(null);

  useEffect(() => { (async () => setCfg(await getCompressSettings()))(); }, []);

  if (!cfg) return <p className="text-sm text-slate-400">読み込み中...</p>;

  const saveCfg = async () => {
    try {
      await setDoc(docRefFn('settings', 'compress'), cfg);
      showToast('圧縮設定を保存しました（チーム共有）');
    } catch (e) { console.error(e); showToast('保存に失敗しました'); }
  };

  const readAsDataUrl = (blob) => new Promise((res, rej) => { const r = new FileReader(); r.onload = (ev) => res(ev.target.result); r.onerror = rej; r.readAsDataURL(blob); });
  const extOk = (name) => /\.(png|jpe?g|webp|gif|bmp)$/i.test(name);

  const runBulk = async (files) => {
    if (!files || !files.length) return;
    setBusy(true); setProgress('準備中...');
    try {
      // 入力を集める（画像ファイル＋ZIPの中身）
      const items = []; // {name, blob}
      for (const f of files) {
        if (/\.zip$/i.test(f.name)) {
          const zin = await JSZip.loadAsync(f);
          const entries = Object.values(zin.files).filter(e => !e.dir && extOk(e.name) && !e.name.startsWith('__MACOSX'));
          for (const e of entries) items.push({ name: e.name.split('/').pop(), blob: await e.async('blob') });
        } else if (f.type.startsWith('image/') || extOk(f.name)) {
          items.push({ name: f.name, blob: f });
        }
      }
      if (!items.length) { showToast('画像が見つかりませんでした'); setBusy(false); setProgress(''); return; }

      const zout = new JSZip();
      let done = 0, before = 0, after = 0, failed = 0;
      for (const item of items) {
        setProgress(`圧縮中... ${done + 1} / ${items.length}`);
        try {
          const src = await readAsDataUrl(item.blob);
          const out = await compressDataUrl(src, cfg.maxSize, cfg.quality);
          before += Math.round(item.blob.size / 1024); after += dataUrlKb(out);
          const outName = item.name.replace(/\.\w+$/, '') + '.jpg';
          zout.file(outName, out.split(',')[1], { base64: true });
        } catch (e) { console.warn('skip', item.name, e); failed++; }
        done++;
      }
      setProgress('ZIPを作成中...');
      const blob = await zout.generateAsync({ type: 'blob' });
      const d = new Date();
      const stamp = `${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `圧縮画像_${stamp}.zip`;
      a.click(); URL.revokeObjectURL(a.href);
      setProgress(`✅ 完了：${done - failed}枚を圧縮（${before}KB → ${after}KB）${failed ? ` ／ ${failed}枚は読み込めずスキップ` : ''}`);
    } catch (e) {
      console.error(e); setProgress('❌ 失敗しました：' + e.message);
    } finally {
      setBusy(false);
      if (fileRef.current) fileRef.current.value = '';
    }
  };

  return (
    <div className="space-y-5">
      <section className="space-y-3">

          「PCに保存」「ギャラリー保存」の画像は、ここで設定したサイズ・画質の軽量JPGになります（MEOの表示速度対策）。
        </p>
        <div className="grid grid-cols-2 gap-3">
          <div>
            <label className="text-xs font-medium text-slate-500 block mb-1">長辺サイズ（px）</label>
            <select value={cfg.maxSize} onChange={(e) => setCfg({ ...cfg, maxSize: Number(e.target.value) })} className="w-full p-2 border rounded text-sm bg-white">
              <option value={800}>800px（最軽量）</option>
              <option value={1000}>1000px</option>
              <option value={1200}>1200px（推奨）</option>
              <option value={1600}>1600px（高精細）</option>
              <option value={0}>縮小しない（原寸）</option>
            </select>
          </div>
          <div>
            <label className="text-xs font-medium text-slate-500 block mb-1">画質</label>
            <select value={cfg.quality} onChange={(e) => setCfg({ ...cfg, quality: Number(e.target.value) })} className="w-full p-2 border rounded text-sm bg-white">
              <option value={0.5}>50%（最軽量）</option>
              <option value={0.6}>60%</option>

      <section className="space-y-3 border-t pt-4">
        <h3 className="text-sm font-bold text-slate-700">過去画像の一括圧縮</h3>

          画像を複数選択（またはZIPごと）でアップロードすると、上の設定で一括圧縮して<b>ZIPでダウンロード</b>できます。差し替え用にどうぞ。
        </p>

// ============ HamburgerMenu ============
function HamburgerMenu({ onClose, accounts, categories, projects, selectedProjectId, setSelectedProjectId, showToast }) {
  const [section, setSection] = useState('main');
  const [confirm, setConfirm] = useState(null);

  const addAccount = async (name) => {
    if (!name.trim()) return;
    await addDoc(colRef('accounts'), { name: name.trim(), createdAt: Date.now() });
    showToast('アカウントを追加しました');
  };
  const renameAccount = async (id, name) => {
    if (!name.trim()) return;
    await updateDoc(docRefFn('accounts', id), { name: name.trim() });
  };
  const deleteAccount = async (a) => {
    const cats = categories.filter(c => c.accountId === a.id);
    const projs = projects.filter(p => p.accountId === a.id);
    setConfirm({
      title: `「${a.name}」を削除しますか？`,
      body: `関連する画像カテゴリ${cats.length}件、プロジェクト${projs.length}件も一緒に削除されます。\n（過去に保存されたギャラリー画像は残ります）`,
      onConfirm: async () => {
        await Promise.all(cats.map(c => deleteDoc(docRefFn('categories', c.id))));
        await Promise.all(projs.map(p => deleteDoc(docRefFn('projects', p.id))));
        await deleteDoc(docRefFn('accounts', a.id));
        showToast('削除しました');
        setConfirm(null);
      },
      onCancel: () => setConfirm(null),
    });
  };
  const addCategory = async (accountId, name) => {
    if (!name.trim() || !accountId) return;
    await addDoc(colRef('categories'), { name: name.trim(), accountId, createdAt: Date.now() });
  };
  const renameCategory = async (id, name) => {
    if (!name.trim()) return;
    await updateDoc(docRefFn('categories', id), { name: name.trim() });
  };
  const deleteCategory = async (c) => {
    const projs = projects.filter(p => p.categoryId === c.id);
    setConfirm({
      title: `「${c.name}」を削除しますか？`,
      body: projs.length ? `このカテゴリを使うプロジェクト${projs.length}件も削除されます。` : `削除します。`,
      onConfirm: async () => {
        await Promise.all(projs.map(p => deleteDoc(docRefFn('projects', p.id))));
        await deleteDoc(docRefFn('categories', c.id));
        showToast('削除しました');
        setConfirm(null);
      },
      onCancel: () => setConfirm(null),
    });
  };
  const addProject = async ({ name, accountId, categoryId }) => {
    if (!name.trim() || !accountId || !categoryId) return;
    const a = accounts.find(x => x.id === accountId);
    const c = categories.find(x => x.id === categoryId);
    await addDoc(colRef('projects'), {
      name: name.trim(), accountId, categoryId,
      accountName: a?.name || '', categoryName: c?.name || '',
      createdAt: Date.now(),
    });
  };
  const deleteProject = async (p) => {
    setConfirm({
      title: `「${p.name}」を削除しますか？`,
      body: '選択中の場合は自動で解除されます。',
      onConfirm: async () => {
        await deleteDoc(docRefFn('projects', p.id));
        if (selectedProjectId === p.id) setSelectedProjectId(null);
        showToast('削除しました');
        setConfirm(null);
      },
      onCancel: () => setConfirm(null),
    });
  };

  return (
    <>
      <div className="fixed inset-0 bg-slate-900/40 z-40" onClick={onClose} />
      <aside className="fixed top-0 right-0 h-full w-full sm:w-[420px] bg-white shadow-2xl z-50 flex flex-col">
        <div className="flex items-center justify-between p-4 border-b bg-slate-50">
          <h2 className="font-bold text-slate-800 flex items-center gap-2">
            {section !== 'main' && (
              <button onClick={() => setSection('main')} className="text-slate-500 hover:text-slate-800"><ChevronLeft className="w-5 h-5" /></button>
            )}
            {section === 'main' ? 'メニュー' : section === 'accounts' ? '運用アカウント管理' : section === 'categories' ? '画像カテゴリ管理' : section === 'projects' ? 'プロジェクト管理' : section === 'release' ? 'リリース情報' : section === 'notify' ? 'メール通知設定' : section === 'compress' ? '画質・一括圧縮' : '改善・問合せ'}
          </h2>
          <button onClick={onClose} className="p-1 hover:bg-slate-200 rounded"><X className="w-5 h-5" /></button>
        </div>
        <div className="flex-1 overflow-y-auto p-4 space-y-2">
          {section === 'main' && (
            <>
              <MenuBtn icon={Sparkles} label="リリース情報" onClick={() => setSection('release')} />
              <MenuBtn icon={Mail} label="改善・問合せ" onClick={() => setSection('contact')} />
              <div className="border-t my-3" />
              <MenuBtn icon={Users} label="運用アカウント管理" onClick={() => setSection('accounts')} sub={`${accounts.length}件`} />
              <MenuBtn icon={Tag} label="画像カテゴリ管理" onClick={() => setSection('categories')} sub={`${categories.length}件`} />
              <MenuBtn icon={Folder} label="プロジェクト管理" onClick={() => setSection('projects')} sub={`${projects.length}件`} />
              <MenuBtn icon={Mail} label="メール通知設定" onClick={() => setSection('notify')} sub="ギャラリー保存時" />
              <MenuBtn icon={Settings} label="画質・一括圧縮" onClick={() => setSection('compress')} sub="保存画質の設定／過去画像の一括圧縮" />
            </>
          )}
          {section === 'release' && <div className="text-sm text-slate-700 whitespace-pre-wrap leading-relaxed bg-slate-50 p-4 rounded-lg">{RELEASE_NOTES}</div>}
          {section === 'contact' && (
            <div className="space-y-3">
              <p className="text-sm text-slate-600">下記のテンプレートをコピーして、担当（HARUKA）宛にお送りください。</p>
              <textarea readOnly value={CONTACT_TEMPLATE} className="w-full h-56 p-3 border rounded-lg text-sm font-mono bg-slate-50" />
              <button onClick={async () => { await copyToClipboard(CONTACT_TEMPLATE); showToast('テンプレートをコピーしました'); }} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-lg font-medium text-sm flex items-center justify-center gap-2"><Copy className="w-4 h-4" />コピーする</button>
            </div>
          )}
          {section === 'notify' && <NotifySettings accounts={accounts} showToast={showToast} />}
          {section === 'compress' && <CompressSection showToast={showToast} />}
          {section === 'accounts' && <AccountManager accounts={accounts} onAdd={addAccount} onRename={renameAccount} onDelete={deleteAccount} />}
          {section === 'categories' && <CategoryManager accounts={accounts} categories={categories} onAdd={addCategory} onRename={renameCategory} onDelete={deleteCategory} />}
          {section === 'projects' && <ProjectManager accounts={accounts} categories={categories} projects={projects} selectedProjectId={selectedProjectId} setSelectedProjectId={setSelectedProjectId} onAdd={addProject} onDelete={deleteProject} />}
        </div>
      </aside>
      {confirm && <ConfirmModal {...confirm} />}
    </>
  );
}

// ============ CreateTab ============
function CreateTab({ user, accounts, categories, projects, selectedProject, showToast, openGallery }) {
  const canvasRef = useRef(null);
  const [baseImage, setBaseImage] = useState(null);
  const [canvasWidth, setCanvasWidth] = useState(1200);
  const [canvasHeight, setCanvasHeight] = useState(900);

  const [accountId, setAccountId] = useState('');
  const [categoryId, setCategoryId] = useState('');
  const [dateISO, setDateISO] = useState(todayISO());
  const [memo, setMemo] = useState('');
  const [isUploading, setIsUploading] = useState(false);
  const [dragOver, setDragOver] = useState(false);

  // プロジェクト選択中は自動適用
  useEffect(() => {
    if (selectedProject) { setAccountId(selectedProject.accountId); setCategoryId(selectedProject.categoryId); }
  }, [selectedProject]);

  const accountLocked = !!selectedProject;
  const account = accounts.find(a => a.id === accountId);
  const category = categories.find(c => c.id === categoryId);
  const catsForAcc = categories.filter(c => c.accountId === accountId);
  useEffect(() => {
    if (!accountLocked && !catsForAcc.find(c => c.id === categoryId)) setCategoryId('');
  }, [accountId, categories]);

  const mmdd = isoToMMDD(dateISO);
  const folderName = buildFolderName({
    accountName: account?.name || '', categoryName: category?.name || '', date: mmdd, memo
  });

  const readFile = (file) => {
    if (!file) return;
    const r = new FileReader();
    r.onload = (ev) => setBaseImage(ev.target.result);
    r.readAsDataURL(file);
  };
  const onFileInput = (e) => readFile(e.target.files[0]);
  const onDrop = (e) => {
    e.preventDefault(); setDragOver(false);
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('image/')) readFile(f);
    else showToast('画像ファイルをドロップしてください');
  };

  // Canvas描画（画像のみ・cover fit）
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvasWidth, canvasHeight);
    ctx.fillStyle = '#f1f5f9';
    ctx.fillRect(0, 0, canvasWidth, canvasHeight);
    if (!baseImage) return;
    const img = new Image();
    img.onload = () => {
      const ir = img.width / img.height, cr = canvasWidth / canvasHeight;
      let dw, dh, ox, oy;
      if (ir > cr) { dh = canvasHeight; dw = img.width * (canvasHeight / img.height); ox = (canvasWidth - dw) / 2; oy = 0; }
      else { dw = canvasWidth; dh = img.height * (canvasWidth / img.width); ox = 0; oy = (canvasHeight - dh) / 2; }
      ctx.drawImage(img, ox, oy, dw, dh);
    };
    img.src = baseImage;
  }, [baseImage, canvasWidth, canvasHeight]);

  const canSave = !!baseImage && !!accountId && !!categoryId;

  const handleDownload = async () => {
    if (!canSave) { showToast('画像とアカウント・カテゴリを設定してください'); return; }
    const c = canvasRef.current; if (!c) return;
    const cfg = await getCompressSettings();
    const url = await compressDataUrl(c.toDataURL('image/png'), cfg.maxSize, cfg.quality);
    const link = document.createElement('a');
    link.download = `${folderName}.jpg`;
    link.href = url; link.click();
    showToast(`保存しました（${dataUrlKb(url)}KB・軽量JPG）`);
  };
  const handleShare = async () => {
    if (!canSave) { showToast('画像とアカウント・カテゴリを設定してください'); return; }
    if (!user || !db) { showToast('データベースに接続できません'); return; }
    const c = canvasRef.current; if (!c) return;
    setIsUploading(true);
    try {
      const cfg = await getCompressSettings();
      const url = await compressDataUrl(c.toDataURL('image/png'), cfg.maxSize, cfg.quality);
      await addDoc(colRef('shared_thumbnails'), {
        imageUrl: url, titleText: '', folderName,
        accountId, accountName: account?.name || '',
        categoryId, categoryName: category?.name || '',
        date: mmdd, memo,
        projectId: selectedProject?.id || null,
        authorId: user.uid, createdAt: Date.now(),
        width: canvasWidth, height: canvasHeight,
      });
      showToast('チームギャラリーに保存しました');
      sendGalleryNotify({ accountId, accountName: account?.name || '', categoryName: category?.name || '', folderName });
    } catch (e) {
      console.error(e);
      showToast('保存に失敗しました。画像が大きすぎる可能性があります。');
    } finally { setIsUploading(false); }
  };

  return (
    <main className="flex-1 overflow-y-auto md:overflow-hidden flex flex-col md:flex-row relative">
      <div className="w-full md:w-[400px] bg-white border-r border-slate-200 md:overflow-y-auto shrink-0">
        <div className="p-6 space-y-6">
          {selectedProject && (
            <div className="bg-blue-50 border border-blue-200 rounded-lg p-3 text-xs text-blue-900">
              <div className="font-medium">📁 プロジェクト適用中</div>
              <div className="mt-1">「{selectedProject.name}」のアカウント・カテゴリが自動入力されます</div>
            </div>
          )}

          <section className="space-y-3">
            <div className="flex items-center space-x-2 border-b pb-2">
              <ImageIcon className="w-5 h-5 text-blue-600" />
              <h2 className="text-base font-semibold">1. ベース画像</h2>
            </div>
            <label
              onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
              onDragLeave={() => setDragOver(false)}
              onDrop={onDrop}
              className={`flex flex-col items-center justify-center w-full h-40 border-2 border-dashed rounded-xl cursor-pointer transition-colors ${dragOver ? 'border-blue-500 bg-blue-50' : 'border-slate-300 bg-slate-50 hover:bg-slate-100'}`}
            >
              {baseImage ? (
                <>
                  <img src={baseImage} alt="アップロード画像" className="max-h-32 max-w-full object-contain rounded" />
                  <p className="text-xs text-slate-500 mt-1.5">タップで差し替え</p>
                </>
              ) : (
                <>
                  <Upload className={`w-8 h-8 mb-2 ${dragOver ? 'text-blue-500' : 'text-slate-400'}`} />
                  <p className="text-sm font-medium text-slate-600">{dragOver ? 'ここにドロップ' : 'クリックまたはドラッグ&ドロップ'}</p>
                  <p className="text-xs text-slate-400 mt-1">PNG / JPG / WEBP</p>
                </>
              )}
              <input type="file" className="hidden" accept="image/*" onChange={onFileInput} />
            </label>
            {baseImage && (
              <button onClick={() => setBaseImage(null)} className="text-xs text-slate-500 hover:text-red-500 underline">画像を外す</button>
            )}
          </section>

          <section className="space-y-3">
            <div className="flex items-center space-x-2 border-b pb-2">
              <Folder className="w-5 h-5 text-blue-600" />
              <h2 className="text-base font-semibold">2. 保存フォルダ名</h2>
            </div>
            <div className="space-y-2">
              <label className="text-xs font-medium text-slate-500">運用アカウント</label>
              <select value={accountId} onChange={(e) => setAccountId(e.target.value)} disabled={accountLocked} className="w-full p-2 border rounded text-sm disabled:bg-slate-100">
                <option value="">選択してください</option>
                {accounts.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
              </select>
            </div>
            <div className="space-y-2">
              <label className="text-xs font-medium text-slate-500">画像カテゴリ</label>
              <select value={categoryId} onChange={(e) => setCategoryId(e.target.value)} disabled={accountLocked || !accountId} className="w-full p-2 border rounded text-sm disabled:bg-slate-100">
                <option value="">選択してください</option>
                {catsForAcc.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
            </div>
            <div className="space-y-2">
              <label className="text-xs font-medium text-slate-500">日付</label>
              <input type="date" value={dateISO} onChange={(e) => setDateISO(e.target.value)} className="w-full p-2 border rounded text-sm" />
            </div>
            <div className="space-y-2">
              <label className="text-xs font-medium text-slate-500">任意テキスト（省略可）</label>
              <input value={memo} onChange={(e) => setMemo(e.target.value)} placeholder="例：夏キャンペーン" className="w-full p-2 border rounded text-sm" />
            </div>
            <div className="bg-slate-50 border border-slate-200 rounded p-3 text-xs">
              <div className="text-slate-500 mb-1">プレビュー</div>
              <div className="font-mono break-all text-slate-800">{folderName}</div>
              <button onClick={async () => { const n = `${folderName}.jpg`; await copyToClipboard(n); showToast(`「${n}」をコピーしました`); }} className="mt-2 w-full bg-blue-50 text-blue-700 hover:bg-blue-100 py-2 rounded font-medium flex items-center justify-center gap-1.5"><Copy className="w-3.5 h-3.5" />タイトル.jpg をコピー（投稿ツール用）</button>
            </div>
          </section>

          <section className="space-y-3 pb-6">
            <div className="flex items-center space-x-2 border-b pb-2">
              <Settings className="w-5 h-5 text-blue-600" />
              <h2 className="text-base font-semibold">3. 画像サイズ</h2>
            </div>
            <div className="flex items-center gap-3">
              <div className="flex-1">
                <label className="block text-xs font-medium text-slate-500 mb-1">幅</label>
                <input type="number" value={canvasWidth} onChange={(e) => setCanvasWidth(Number(e.target.value))} className="w-full p-2 border rounded text-sm" />
              </div>
              <div className="text-slate-400 mt-4">×</div>
              <div className="flex-1">
                <label className="block text-xs font-medium text-slate-500 mb-1">高さ</label>
                <input type="number" value={canvasHeight} onChange={(e) => setCanvasHeight(Number(e.target.value))} className="w-full p-2 border rounded text-sm" />
              </div>
            </div>
            <div className="flex gap-2">
              <button onClick={() => { setCanvasWidth(1200); setCanvasHeight(900); }} className="text-xs bg-slate-100 hover:bg-slate-200 px-3 py-1.5 rounded font-medium">1200×900</button>
              <button onClick={() => { setCanvasWidth(1080); setCanvasHeight(1080); }} className="text-xs bg-slate-100 hover:bg-slate-200 px-3 py-1.5 rounded font-medium">1080×1080</button>
            </div>
          </section>
        </div>
      </div>

      <div className="flex-1 bg-slate-200/50 p-4 md:p-6 pb-24 md:pb-6 flex flex-col overflow-auto">
        <div className="flex flex-wrap items-center justify-end gap-2 mb-4">
          <button onClick={openGallery} className="flex items-center gap-2 bg-white hover:bg-slate-50 border border-slate-200 text-slate-700 px-3 py-2 rounded-lg font-medium text-sm shadow-sm">
            <Library className="w-4 h-4 text-blue-600" />チームギャラリー
          </button>
          <button onClick={handleShare} disabled={isUploading || !canSave} className="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 text-white px-4 py-2 rounded-lg font-medium text-sm shadow">
            {isUploading ? <Loader2 className="w-4 h-4 animate-spin" /> : <Share2 className="w-4 h-4" />}保存Boxへ共有
          </button>
          <button onClick={handleDownload} disabled={!canSave} className="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 text-white px-4 py-2 rounded-lg font-medium text-sm shadow">
            <Download className="w-4 h-4" />PCに保存
          </button>
        </div>
        <div className="flex-1 flex flex-col items-center justify-center">
          <div className="relative shadow-2xl bg-white rounded-md overflow-hidden ring-1 ring-slate-900/5" style={{ maxWidth: '100%', maxHeight: '100%', aspectRatio: `${canvasWidth} / ${canvasHeight}` }}>
            <canvas ref={canvasRef} width={canvasWidth} height={canvasHeight} className="w-full h-full object-contain" />
          </div>
          <p className="mt-4 text-sm text-slate-500 font-medium">書き出しサイズ: {canvasWidth} × {canvasHeight} px</p>
        </div>
      </div>
    </main>
  );
}

// ============ GalleryModal ============
function GalleryModal({ onClose, images, accounts, categories, showToast }) {
  const [filterMode, setFilterMode] = useState('all'); // all|account|category|both
  const [filterAccountId, setFilterAccountId] = useState('');
  const [filterCategoryId, setFilterCategoryId] = useState('');
  const [searchText, setSearchText] = useState('');
  const [searchMode, setSearchMode] = useState('AND'); // AND|OR
  const [editing, setEditing] = useState(null); // 分類変更モーダル用
  const [confirm, setConfirm] = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [expandedAcc, setExpandedAcc] = useState({});

  // フィルタ
  const filtered = useMemo(() => {
    let list = images;
    if (filterMode === 'account' && filterAccountId) list = list.filter(i => i.accountId === filterAccountId);
    else if (filterMode === 'category' && filterCategoryId) list = list.filter(i => i.categoryId === filterCategoryId);
    else if (filterMode === 'both') {
      if (filterAccountId) list = list.filter(i => i.accountId === filterAccountId);
      if (filterCategoryId) list = list.filter(i => i.categoryId === filterCategoryId);
    }
    const kw = searchText.trim().split(/\s+/).filter(Boolean);
    if (kw.length) {
      list = list.filter(i => {
        const hay = [i.folderName, i.titleText, i.accountName, i.categoryName, i.memo].filter(Boolean).join(' ').toLowerCase();
        return searchMode === 'AND' ? kw.every(k => hay.includes(k.toLowerCase())) : kw.some(k => hay.includes(k.toLowerCase()));
      });
    }
    return list;
  }, [images, filterMode, filterAccountId, filterCategoryId, searchText, searchMode]);

  // アカウント別 矢印切替
  const cycleAccount = (dir) => {
    const ids = accounts.map(a => a.id);
    if (!ids.length) return;
    const cur = ids.indexOf(filterAccountId);
    const next = (cur + dir + ids.length) % ids.length;
    setFilterAccountId(ids[next]);
  };
  const cycleCategory = (dir) => {
    const list = (filterMode === 'both' && filterAccountId) ? categories.filter(c => c.accountId === filterAccountId) : categories;
    const ids = list.map(c => c.id);
    if (!ids.length) return;
    const cur = ids.indexOf(filterCategoryId);
    const next = (cur + dir + ids.length) % ids.length;
    setFilterCategoryId(ids[next]);
  };

  const catsForFilter = (filterMode === 'both' && filterAccountId) ? categories.filter(c => c.accountId === filterAccountId) : categories;

  const handleCopyLink = async (id) => {
    const base = location.origin + location.pathname;
    await copyToClipboard(`${base}?id=${id}`);
    showToast('リンクをコピーしました');
  };
  const handleDelete = (img) => {
    setConfirm({
      title: '画像を削除しますか？', body: '元に戻せません。',
      onConfirm: async () => {
        await deleteDoc(docRefFn('shared_thumbnails', img.id));
        showToast('削除しました');
        setConfirm(null);
      },
      onCancel: () => setConfirm(null),
    });
  };

  // DnD
  const [draggingId, setDraggingId] = useState(null);
  const onDragStart = (e, id) => { setDraggingId(id); e.dataTransfer.effectAllowed = 'move'; };
  const onDragEnd = () => setDraggingId(null);
  const moveImage = async (img, newAccountId, newCategoryId) => {
    const a = accounts.find(x => x.id === newAccountId);
    const c = newCategoryId ? categories.find(x => x.id === newCategoryId) : null;
    const newFolder = buildFolderName({
      accountName: a?.name || '', categoryName: c?.name || '',
      date: img.date || '', memo: img.memo || ''
    });
    await updateDoc(docRefFn('shared_thumbnails', img.id), {
      accountId: newAccountId, accountName: a?.name || '',
      categoryId: newCategoryId || null, categoryName: c?.name || '',
      folderName: newFolder,
    });
    showToast('分類を変更しました');
  };
  const dropToAccount = async (accId) => {
    if (!draggingId) return;
    const img = images.find(i => i.id === draggingId);
    if (img) await moveImage(img, accId, null);
    setDraggingId(null);
  };
  const dropToCategory = async (cat) => {
    if (!draggingId) return;
    const img = images.find(i => i.id === draggingId);
    if (img) await moveImage(img, cat.accountId, cat.id);
    setDraggingId(null);
  };

  return (
    <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-50 flex justify-center items-center p-2 md:p-6">
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-7xl h-full max-h-[95vh] flex flex-col overflow-hidden">
        <div className="flex items-center justify-between p-4 border-b bg-slate-50 shrink-0">
          <div className="flex items-center space-x-3">
            <div className="bg-blue-100 p-2 rounded-xl text-blue-600"><Library className="w-5 h-5" /></div>
            <div>
              <h2 className="text-base md:text-lg font-bold text-slate-800">チームギャラリー</h2>
              <p className="text-xs text-slate-500">{filtered.length} / {images.length} 件</p>
            </div>
          </div>
          <button onClick={onClose} className="p-2 hover:bg-slate-200 rounded-full"><X className="w-5 h-5" /></button>
        </div>

        {/* フィルタ・検索 */}
        <div className="p-3 border-b bg-white space-y-2 shrink-0">
          <div className="flex flex-wrap gap-1">
            {[
              { k: 'all', l: '全一覧' }, { k: 'account', l: 'アカウント別' },
              { k: 'category', l: 'カテゴリ別' }, { k: 'both', l: 'アカウント×カテゴリ' }
            ].map(t => (
              <button key={t.k} onClick={() => setFilterMode(t.k)} className={`px-3 py-1.5 rounded-md text-xs font-medium ${filterMode === t.k ? 'bg-blue-600 text-white' : 'bg-slate-100 hover:bg-slate-200 text-slate-700'}`}>{t.l}</button>
            ))}
          </div>
          {filterMode === 'account' && (
            <div className="flex items-center gap-2">
              <button onClick={() => cycleAccount(-1)} className="p-1 rounded hover:bg-slate-100"><ChevronLeft className="w-4 h-4" /></button>
              <select value={filterAccountId} onChange={(e) => setFilterAccountId(e.target.value)} className="flex-1 p-2 border rounded text-sm">
                <option value="">すべて</option>
                {accounts.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
              </select>
              <button onClick={() => cycleAccount(1)} className="p-1 rounded hover:bg-slate-100"><ChevronRight className="w-4 h-4" /></button>
            </div>
          )}
          {filterMode === 'category' && (
            <div className="flex items-center gap-2">
              <button onClick={() => cycleCategory(-1)} className="p-1 rounded hover:bg-slate-100"><ChevronLeft className="w-4 h-4" /></button>
              <select value={filterCategoryId} onChange={(e) => setFilterCategoryId(e.target.value)} className="flex-1 p-2 border rounded text-sm">
                <option value="">すべて</option>
                {categories.map(c => <option key={c.id} value={c.id}>{c.name}（{accounts.find(a => a.id === c.accountId)?.name || '?'}）</option>)}
              </select>
              <button onClick={() => cycleCategory(1)} className="p-1 rounded hover:bg-slate-100"><ChevronRight className="w-4 h-4" /></button>
            </div>
          )}
          {filterMode === 'both' && (
            <div className="flex flex-col sm:flex-row gap-2">
              <select value={filterAccountId} onChange={(e) => { setFilterAccountId(e.target.value); setFilterCategoryId(''); }} className="flex-1 p-2 border rounded text-sm">
                <option value="">アカウント選択</option>
                {accounts.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
              </select>
              <select value={filterCategoryId} onChange={(e) => setFilterCategoryId(e.target.value)} disabled={!filterAccountId} className="flex-1 p-2 border rounded text-sm">
                <option value="">カテゴリ選択</option>
                {catsForFilter.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
            </div>
          )}
          <div className="flex items-center gap-2">
            <div className="relative flex-1">
              <Search className="w-4 h-4 text-slate-400 absolute left-2 top-1/2 -translate-y-1/2" />
              <input value={searchText} onChange={(e) => setSearchText(e.target.value)} placeholder="タイトル/アカウント/カテゴリ/メモ 検索（スペース区切り）" className="w-full pl-8 pr-2 py-2 border rounded text-sm" />
            </div>
            <button onClick={() => setSearchMode(searchMode === 'AND' ? 'OR' : 'AND')} className="px-3 py-2 border rounded text-xs font-bold bg-slate-50 hover:bg-slate-100">{searchMode}</button>
          </div>
        </div>

        <div className="flex-1 flex overflow-hidden">
          {/* サイドバー */}
          <aside className={`bg-slate-50 border-r overflow-y-auto shrink-0 transition-all ${sidebarOpen ? 'w-56' : 'w-10'}`}>
            <button onClick={() => setSidebarOpen(!sidebarOpen)} className="w-full p-2 text-xs text-slate-500 hover:bg-slate-100 flex items-center justify-between">
              {sidebarOpen && <span>ドラッグで分類変更</span>}
              {sidebarOpen ? <ChevronLeft className="w-4 h-4" /> : <ChevronRight className="w-4 h-4" />}
            </button>
            {sidebarOpen && (
              <div className="p-2 space-y-1">
                {accounts.map(a => {
                  const cats = categories.filter(c => c.accountId === a.id);
                  const expanded = expandedAcc[a.id] ?? true;
                  return (
                    <div key={a.id}>
                      <div
                        onDragOver={(e) => { e.preventDefault(); e.currentTarget.classList.add('dnd-hi'); }}
                        onDragLeave={(e) => e.currentTarget.classList.remove('dnd-hi')}
                        onDrop={(e) => { e.currentTarget.classList.remove('dnd-hi'); dropToAccount(a.id); }}
                        className="flex items-center gap-1 p-1.5 rounded bg-white border border-slate-200 text-xs font-medium"
                      >
                        <button onClick={() => setExpandedAcc(prev => ({...prev, [a.id]: !expanded}))} className="p-0.5">
                          {expanded ? <ChevronDown className="w-3 h-3" /> : <ChevronRightSmall className="w-3 h-3" />}
                        </button>
                        <Users className="w-3 h-3 text-blue-500" />
                        <span className="truncate flex-1">{a.name}</span>
                      </div>
                      {expanded && cats.map(c => (
                        <div
                          key={c.id}
                          onDragOver={(e) => { e.preventDefault(); e.currentTarget.classList.add('dnd-hi'); }}
                          onDragLeave={(e) => e.currentTarget.classList.remove('dnd-hi')}
                          onDrop={(e) => { e.currentTarget.classList.remove('dnd-hi'); dropToCategory(c); }}
                          className="ml-4 flex items-center gap-1 p-1.5 rounded hover:bg-white border border-transparent text-xs"
                        >
                          <Tag className="w-3 h-3 text-slate-400" />
                          <span className="truncate">{c.name}</span>
                        </div>
                      ))}
                    </div>
                  );
                })}
              </div>
            )}
          </aside>

          {/* 一覧 */}
          <div className="flex-1 overflow-y-auto p-4 bg-slate-100/50">
            {filtered.length === 0 ? (
              <div className="h-full flex flex-col items-center justify-center text-slate-400 space-y-3">
                <Library className="w-14 h-14 opacity-30" />
                <p className="font-medium text-slate-500">該当する画像はありません</p>
              </div>
            ) : (
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                {filtered.map(img => (
                  <div
                    key={img.id}
                    draggable
                    onDragStart={(e) => onDragStart(e, img.id)}
                    onDragEnd={onDragEnd}
                    className={`bg-white rounded-xl shadow-sm border overflow-hidden flex flex-col hover:shadow-md transition-shadow ${draggingId === img.id ? 'opacity-40' : ''}`}
                  >
                    <div className="aspect-[4/3] bg-slate-200 relative overflow-hidden group cursor-move">
                      <img src={img.imageUrl} alt={img.folderName || img.titleText} className="w-full h-full object-cover" draggable={false} />
                      <div className="absolute inset-0 bg-slate-900/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-2">
                        <button title="ダウンロード" onClick={() => { const a = document.createElement('a'); a.download = `${img.folderName || 'image'}.jpg`; a.href = img.imageUrl; a.click(); }} className="bg-white/90 text-slate-800 hover:bg-white p-2 rounded-full shadow-lg"><Download className="w-4 h-4" /></button>
                        <button title="リンク発行" onClick={() => handleCopyLink(img.id)} className="bg-white/90 text-blue-700 hover:bg-white p-2 rounded-full shadow-lg"><Link2 className="w-4 h-4" /></button>
                        <button title="分類変更" onClick={() => setEditing(img)} className="bg-white/90 text-indigo-700 hover:bg-white p-2 rounded-full shadow-lg"><Edit3 className="w-4 h-4" /></button>
                        <button title="削除" onClick={() => handleDelete(img)} className="bg-white/90 text-red-600 hover:bg-red-50 p-2 rounded-full shadow-lg"><Trash2 className="w-4 h-4" /></button>
                      </div>
                    </div>
                    <div className="p-3">
                      <p className="text-xs font-bold text-slate-800 line-clamp-2 leading-snug mb-1 break-all">{img.folderName || img.titleText || '（未分類）'}</p>
                      <div className="flex items-center justify-between gap-1">
                        <p className="text-[10px] text-slate-400">{fmtDateTime(img.createdAt)}</p>
                        <button onClick={async () => { const n = `${img.folderName || img.titleText || 'image'}.jpg`; await copyToClipboard(n); showToast(`「${n}」をコピーしました`); }} className="text-[10px] bg-blue-50 text-blue-700 hover:bg-blue-100 px-2 py-1 rounded flex items-center gap-1 shrink-0"><Copy className="w-3 h-3" />.jpgコピー</button>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>
      {editing && (
        <EditImageModal img={editing} accounts={accounts} categories={categories}
          onSave={async (patch) => { await moveImage(editing, patch.accountId, patch.categoryId); setEditing(null); }}
          onSaveMeta={async (patch) => {
            const a = accounts.find(x => x.id === patch.accountId);
            const c = patch.categoryId ? categories.find(x => x.id === patch.categoryId) : null;
            const newFolder = buildFolderName({ accountName: a?.name || '', categoryName: c?.name || '', date: patch.date, memo: patch.memo });
            await updateDoc(docRefFn('shared_thumbnails', editing.id), {
              accountId: patch.accountId, accountName: a?.name || '',
              categoryId: patch.categoryId || null, categoryName: c?.name || '',
              date: patch.date, memo: patch.memo, folderName: newFolder,
            });
            showToast('保存しました');
            setEditing(null);
          }}
          onClose={() => setEditing(null)}
        />
      )}
      {confirm && <ConfirmModal {...confirm} />}
    </div>
  );
}

function EditImageModal({ img, accounts, categories, onSaveMeta, onClose }) {
  const [accountId, setAccountId] = useState(img.accountId || '');
  const [categoryId, setCategoryId] = useState(img.categoryId || '');
  const [dateVal, setDateVal] = useState(img.date || '');
  const [memo, setMemo] = useState(img.memo || '');
  const cats = categories.filter(c => c.accountId === accountId);
  useEffect(() => { if (!cats.find(c => c.id === categoryId)) setCategoryId(''); }, [accountId]);
  const a = accounts.find(x => x.id === accountId);
  const c = categories.find(x => x.id === categoryId);
  const preview = buildFolderName({ accountName: a?.name || '', categoryName: c?.name || '', date: dateVal, memo });
  return (
    <div className="fixed inset-0 bg-slate-900/60 z-[110] flex items-center justify-center p-4">
      <div className="bg-white rounded-2xl shadow-2xl p-5 max-w-md w-full space-y-3">
        <h3 className="font-bold text-slate-800">分類を変更</h3>
        <div className="space-y-2">
          <label className="text-xs font-medium text-slate-500">運用アカウント</label>
          <select value={accountId} onChange={(e) => setAccountId(e.target.value)} className="w-full p-2 border rounded text-sm">
            <option value="">選択</option>
            {accounts.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
          </select>
        </div>
        <div className="space-y-2">
          <label className="text-xs font-medium text-slate-500">画像カテゴリ</label>
          <select value={categoryId} onChange={(e) => setCategoryId(e.target.value)} disabled={!accountId} className="w-full p-2 border rounded text-sm">
            <option value="">選択</option>
            {cats.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
        </div>
        <div className="grid grid-cols-2 gap-2">
          <div>
            <label className="text-xs font-medium text-slate-500">日付 (MM-DD)</label>
            <input value={dateVal} onChange={(e) => setDateVal(e.target.value)} placeholder="07-08" className="w-full p-2 border rounded text-sm" />
          </div>
          <div>
            <label className="text-xs font-medium text-slate-500">任意テキスト</label>
            <input value={memo} onChange={(e) => setMemo(e.target.value)} className="w-full p-2 border rounded text-sm" />
          </div>
        </div>
        <div className="bg-slate-50 border rounded p-2 text-xs">
          <div className="text-slate-500 mb-1">新しいフォルダ名</div>
          <div className="font-mono break-all">{preview}</div>
        </div>
        <div className="flex justify-end gap-2 pt-1">
          <button onClick={onClose} className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium">キャンセル</button>
          <button onClick={() => onSaveMeta({ accountId, categoryId, date: dateVal, memo })} disabled={!accountId} className="px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 text-white text-sm font-medium">保存</button>
        </div>
      </div>
    </div>
  );
}

// ============ LinksTab ============
function LinksTab({ teamLinks, personalLinks, setPersonalLinks, showToast }) {
  const [sub, setSub] = useState('team');
  const [editing, setEditing] = useState(null);
  const addTeam = async (name, url) => { await addDoc(colRef('links'), { name, url, createdAt: Date.now() }); showToast('リンクを追加しました'); };
  const updateTeam = async (id, name, url) => { await updateDoc(docRefFn('links', id), { name, url }); showToast('更新しました'); };
  const deleteTeam = async (id) => { await deleteDoc(docRefFn('links', id)); showToast('削除しました'); };
  const addPersonal = (name, url) => { setPersonalLinks(prev => [{ id: Date.now().toString(), name, url }, ...prev]); showToast('リンクを追加しました'); };
  const updatePersonal = (id, name, url) => { setPersonalLinks(prev => prev.map(l => l.id === id ? { ...l, name, url } : l)); showToast('更新しました'); };
  const deletePersonal = (id) => { setPersonalLinks(prev => prev.filter(l => l.id !== id)); showToast('削除しました'); };
  const items = sub === 'team' ? teamLinks : personalLinks;
  return (
    <main className="flex-1 overflow-y-auto p-4 md:p-8 bg-slate-50">
      <div className="max-w-3xl mx-auto space-y-4">
        <div className="flex items-center justify-between">
          <div className="flex gap-1 bg-white border border-slate-200 rounded-lg p-1">
            <button onClick={() => setSub('team')} className={`px-4 py-1.5 rounded-md text-sm font-medium ${sub === 'team' ? 'bg-blue-600 text-white' : 'text-slate-600 hover:bg-slate-50'}`}>チーム共有</button>
            <button onClick={() => setSub('personal')} className={`px-4 py-1.5 rounded-md text-sm font-medium ${sub === 'personal' ? 'bg-blue-600 text-white' : 'text-slate-600 hover:bg-slate-50'}`}>個人ローカル</button>
          </div>
          <button onClick={() => setEditing({ mode: 'add', kind: sub })} className="flex items-center gap-1 bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg text-sm font-medium shadow"><Plus className="w-4 h-4" />追加</button>
        </div>
        {sub === 'personal' && <p className="text-xs text-slate-500">※ 個人ローカルはこの端末・このブラウザにのみ保存されます</p>}
        {items.length === 0 ? (
          <div className="bg-white border border-dashed border-slate-300 rounded-xl p-10 text-center text-slate-400">
            <Link2 className="w-10 h-10 mx-auto mb-3 opacity-40" />
            <p className="text-sm">まだリンクが登録されていません</p>
          </div>
        ) : (
          <ul className="space-y-2">
            {items.map(l => (
              <li key={l.id} className="bg-white border border-slate-200 rounded-lg p-3 flex items-center gap-2 shadow-sm">
                <div className="flex-1 min-w-0">
                  <div className="font-medium text-slate-800 truncate">{l.name}</div>
                  <div className="text-xs text-slate-500 truncate">{l.url}</div>
                </div>
                <a href={l.url} target="_blank" rel="noopener noreferrer" className="p-2 rounded hover:bg-blue-50 text-blue-600" title="開く"><ExternalLink className="w-4 h-4" /></a>
                <button onClick={() => setEditing({ mode: 'edit', target: l, kind: sub })} className="p-2 rounded hover:bg-slate-100 text-slate-500" title="編集"><Edit3 className="w-4 h-4" /></button>
                <button onClick={() => sub === 'team' ? deleteTeam(l.id) : deletePersonal(l.id)} className="p-2 rounded hover:bg-red-50 text-red-500" title="削除"><Trash2 className="w-4 h-4" /></button>
              </li>
            ))}
          </ul>
        )}
      </div>
      {editing && (
        <LinkEditModal
          initial={editing.target}
          onClose={() => setEditing(null)}
          onSubmit={(name, url) => {
            if (editing.mode === 'add') { editing.kind === 'team' ? addTeam(name, url) : addPersonal(name, url); }
            else { editing.kind === 'team' ? updateTeam(editing.target.id, name, url) : updatePersonal(editing.target.id, name, url); }
            setEditing(null);
          }}
        />
      )}
    </main>
  );
}

function LinkEditModal({ initial, onClose, onSubmit }) {
  const [name, setName] = useState(initial?.name || '');
  const [url, setUrl] = useState(initial?.url || '');
  const submit = (e) => { e.preventDefault(); if (!name.trim() || !url.trim()) return; onSubmit(name.trim(), url.trim()); };
  return (
    <div className="fixed inset-0 bg-slate-900/60 z-[110] flex items-center justify-center p-4">
      <form onSubmit={submit} className="bg-white rounded-2xl shadow-2xl p-5 max-w-md w-full space-y-3">
        <h3 className="font-bold text-slate-800">{initial ? 'リンクを編集' : 'リンクを追加'}</h3>
        <div className="space-y-2">
          <label className="text-xs font-medium text-slate-500">名称</label>
          <input value={name} onChange={(e) => setName(e.target.value)} autoFocus placeholder="例：Notion 運用DB" className="w-full p-2 border rounded text-sm" />
        </div>
        <div className="space-y-2">
          <label className="text-xs font-medium text-slate-500">URL</label>
          <input value={url} onChange={(e) => setUrl(e.target.value)} placeholder="https://..." className="w-full p-2 border rounded text-sm" />
        </div>
        <div className="flex justify-end gap-2 pt-1">
          <button type="button" onClick={onClose} className="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium">キャンセル</button>
          <button type="submit" className="px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium">保存</button>
        </div>
      </form>
    </div>
  );
}

// ============ ViewerMode（?id=xxx 単独閲覧） ============
function ViewerMode({ id, showToast }) {
  const [data, setData] = useState(null);
  const [notFound, setNotFound] = useState(false);
  useEffect(() => {
    (async () => {
      try {
        const s = await getDoc(docRefFn('shared_thumbnails', id));
        if (!s.exists()) { setNotFound(true); return; }
        setData({ id: s.id, ...s.data() });
      } catch (e) { console.error(e); setNotFound(true); }
    })();
  }, [id]);
  if (notFound) return (
    <div className="h-screen flex flex-col items-center justify-center text-slate-500 space-y-3">
      <ImageIcon className="w-14 h-14 opacity-40" />
      <p>画像が見つかりません（削除された可能性があります）</p>
      <a href={location.pathname} className="text-blue-600 underline text-sm">ツールを開く</a>
    </div>
  );
  if (!data) return <div className="h-screen flex items-center justify-center text-slate-500"><Loader2 className="w-6 h-6 animate-spin mr-2" />読み込み中…</div>;
  return (
    <div className="min-h-screen bg-slate-900 text-white flex flex-col">
      <header className="p-4 flex items-center justify-between border-b border-slate-700">
        <a href={location.pathname} className="text-sm text-slate-300 hover:text-white flex items-center gap-1"><ChevronLeft className="w-4 h-4" />ツールへ戻る</a>
        <div className="text-xs text-slate-400">{fmtDateTime(data.createdAt)}</div>
      </header>
      <div className="flex-1 flex flex-col items-center justify-center p-4">
        <img src={data.imageUrl} alt={data.folderName} className="max-w-full max-h-[70vh] rounded shadow-2xl bg-white" />
        <p className="mt-4 font-mono break-all text-center text-sm text-slate-200">{data.folderName || data.titleText || '（未分類）'}</p>
        <div className="mt-4 flex gap-2">
          <button onClick={() => { const a = document.createElement('a'); a.download = `${data.folderName || 'image'}.jpg`; a.href = data.imageUrl; a.click(); }} className="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2"><Download className="w-4 h-4" />画像をダウンロード</button>
          <button onClick={async () => { await copyToClipboard(location.href); showToast('リンクをコピーしました'); }} className="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2"><Copy className="w-4 h-4" />リンクをコピー</button>
        </div>
      </div>
    </div>
  );
}

// ============ Main App ============
function App() {
  const viewerId = new URLSearchParams(location.search).get('id');
  const [user, setUser] = useState(null);
  const [accounts, setAccounts] = useState([]);
  const [categories, setCategories] = useState([]);
  const [projects, setProjects] = useState([]);
  const [teamLinks, setTeamLinks] = useState([]);
  const [images, setImages] = useState([]);
  const [personalLinks, setPersonalLinks] = useLocalStorage('personal_links', []);
  const [selectedProjectId, setSelectedProjectId] = useLocalStorage('selected_project_id', null);
  const [tab, setTab] = useState('create');
  const [menuOpen, setMenuOpen] = useState(false);
  const [galleryOpen, setGalleryOpen] = useState(false);
  const [toastMsg, setToastMsg] = useState('');
  const showToast = (m) => { setToastMsg(m); setTimeout(() => setToastMsg(''), 3000); };

  useEffect(() => {
    if (!auth) return;
    signInAnonymously(auth).catch(e => console.error("Auth error", e));
    const unsub = onAuthStateChanged(auth, setUser);
    return () => unsub();
  }, []);

  useEffect(() => {
    if (!user || !db) return;
    const subs = [
      onSnapshot(colRef('accounts'), s => { const arr = []; s.forEach(d => arr.push({ id: d.id, ...d.data() })); arr.sort((a,b) => (a.createdAt||0) - (b.createdAt||0)); setAccounts(arr); }),
      onSnapshot(colRef('categories'), s => { const arr = []; s.forEach(d => arr.push({ id: d.id, ...d.data() })); arr.sort((a,b) => (a.createdAt||0) - (b.createdAt||0)); setCategories(arr); }),
      onSnapshot(colRef('projects'), s => { const arr = []; s.forEach(d => arr.push({ id: d.id, ...d.data() })); arr.sort((a,b) => (a.createdAt||0) - (b.createdAt||0)); setProjects(arr); }),
      onSnapshot(colRef('links'), s => { const arr = []; s.forEach(d => arr.push({ id: d.id, ...d.data() })); arr.sort((a,b) => (b.createdAt||0) - (a.createdAt||0)); setTeamLinks(arr); }),
      onSnapshot(colRef('shared_thumbnails'), s => { const arr = []; s.forEach(d => arr.push({ id: d.id, ...d.data() })); arr.sort((a,b) => (b.createdAt||0) - (a.createdAt||0)); setImages(arr); }),
    ];
    return () => subs.forEach(u => u());
  }, [user]);

  if (viewerId) return (<><Toast msg={toastMsg} /><ViewerMode id={viewerId} showToast={showToast} /></>);
  const selectedProject = projects.find(p => p.id === selectedProjectId) || null;
  return (
    <div className="flex flex-col h-screen bg-slate-50 text-slate-800">
      <Toast msg={toastMsg} />
      <Header tab={tab} onTabChange={setTab} onMenu={() => setMenuOpen(true)} onGallery={() => setGalleryOpen(true)} />
      {tab === 'create' && (
        <CreateTab user={user} accounts={accounts} categories={categories} projects={projects}
          selectedProject={selectedProject} showToast={showToast} openGallery={() => setGalleryOpen(true)} />
      )}
      {tab === 'links' && (
        <LinksTab teamLinks={teamLinks} personalLinks={personalLinks} setPersonalLinks={setPersonalLinks} showToast={showToast} />
      )}
      {menuOpen && (
        <HamburgerMenu onClose={() => setMenuOpen(false)}
          accounts={accounts} categories={categories} projects={projects}
          selectedProjectId={selectedProjectId} setSelectedProjectId={setSelectedProjectId}
          showToast={showToast} />
      )}
      {galleryOpen && (
        <GalleryModal onClose={() => setGalleryOpen(false)}
          images={images} accounts={accounts} categories={categories} showToast={showToast} />
      )}
    </div>
  );
}

function Root() {
  const [unlocked, setUnlocked] = useState(localStorage.getItem('meo_unlocked') === '1');
  if (!unlocked) return <PassphraseGate onUnlock={() => setUnlocked(true)} />;
  return <App />;
}

createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
